name: Firebase 자동 배포

on:
  push:
    branches:
      - claude/church-worship-sheet-music-dMndd
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 패키지 설치
        run: npm ci

      - name: 빌드
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: npm run build

      - name: Firebase Hosting 배포
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json npx firebase-tools deploy \
            --only hosting \
            --project tvpcainos \
            --non-interactive

      - name: Supabase Edge Function 배포 + 시크릿 설정
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Supabase CLI 설치
          npm install -g supabase@latest --silent

          # Edge Function 배포
          supabase functions deploy send-fcm \
            --project-ref byvbrsuvporwhlapecja \
            --no-verify-jwt

          # Firebase 서비스 계정을 Supabase 시크릿으로 등록 (Management API)
          python3 -c "
          import json, sys, urllib.request
          sa  = sys.argv[1]
          tok = sys.argv[2]
          req = urllib.request.Request(
            'https://api.supabase.com/v1/projects/byvbrsuvporwhlapecja/secrets',
            data=json.dumps([{'name':'FIREBASE_SERVICE_ACCOUNT','value':sa}]).encode(),
            headers={'Authorization':'Bearer '+tok,'Content-Type':'application/json'},
            method='POST'
          )
          urllib.request.urlopen(req)
          print('시크릿 설정 완료')
          " "$FIREBASE_SA" "$SUPABASE_ACCESS_TOKEN"
