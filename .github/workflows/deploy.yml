name: Firebase 자동 배포

on:
  push:
    branches:
      - claude/church-worship-sheet-music-dMndd
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 패키지 설치
        run: npm ci

      - name: 빌드
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: npm run build

      - name: Firebase Hosting 배포
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: tvpcainos

      - name: Firestore & Storage 규칙 배포
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json npx firebase-tools deploy --only firestore:rules,storage --project tvpcainos --non-interactive

      - name: Storage CORS 설정
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > /tmp/sa.json
          printf '[{"origin":["https://tvpcainos.web.app","https://tvpcainos.firebaseapp.com"],"method":["GET","PUT","POST","DELETE","HEAD"],"responseHeader":["Content-Type","Authorization","Content-Length","User-Agent"],"maxAgeSeconds":3600}]' > /tmp/cors.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json
          gsutil cors set /tmp/cors.json gs://tvpcainos.firebasestorage.app
