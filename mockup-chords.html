<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드 싱크 목업</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
  body { background: #f2f2f7; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  :root {
    --bg: #f2f2f7; --surf: #fff; --card: #f8f8fb; --bdr: #e5e5ea;
    --pur: #6b5de7; --txt: #1c1c1e; --dim: #8e8e93; --red: #ff3b30;
  }

  /* 헤더 */
  .hdr { background: var(--surf); border-bottom: 1px solid var(--bdr);
    padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .hdr-title { font-size: 14px; font-weight: 800; color: var(--txt); }
  .hdr-key { font-size: 11px; font-weight: 700; background: #6b5de718; color: var(--pur);
    border: 1px solid #6b5de733; border-radius: 6px; padding: 2px 8px; }

  /* 유튜브 미니 */
  .yt-mini { background: #111827; display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; flex-shrink: 0; }
  .yt-thumb-mini { width: 64px; height: 36px; background: #1e293b; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .yt-info { flex: 1; min-width: 0; }
  .yt-song { font-size: 12px; font-weight: 700; color: #fff; }
  .yt-progress { height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 5px; }
  .yt-fill { height: 100%; width: 38%; background: #ff3b30; border-radius: 2px; }
  .yt-time { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 3px; }
  .yt-ctrl { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .yt-btn { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .yt-play-btn { background: #ff3b30; color: #fff; }
  .yt-skip-btn { background: rgba(255,255,255,0.15); color: #fff; }

  /* 메인 */
  .main { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .main::-webkit-scrollbar { display: none; }

  /* 현재 코드 (큰 카드) */
  .cur-card { background: var(--pur); border-radius: 16px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px; }
  .cur-left { flex: 1; }
  .cur-label { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.65); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
  .cur-name { font-size: 64px; font-weight: 900; color: #fff; line-height: 1; letter-spacing: -3px; }
  .cur-sub { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 600; margin-top: 2px; }
  .cur-right { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }

  /* 다음 코드 미리보기 */
  .next-box { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 8px 12px; text-align: center; }
  .next-lbl { font-size: 9px; color: rgba(255,255,255,0.65); font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
  .next-name { font-size: 28px; font-weight: 900; color: #fff; line-height: 1; }

  /* 악기 다이어그램 가로 배치 */
  .diag-row { display: flex; gap: 8px; }

  /* 기타 */
  .guitar-card { background: var(--surf); border: 1px solid var(--bdr); border-radius: 14px;
    padding: 10px 12px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .diag-title { font-size: 10px; font-weight: 800; color: var(--dim); letter-spacing: 0.05em; text-transform: uppercase; }
  .guitar-diag { position: relative; width: 80px; height: 96px; }
  .g-frets-wrap { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 0 5px; }
  .g-nut { height: 4px; background: var(--txt); width: 100%; border-radius: 2px; }
  .g-fret-area { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding-top: 2px; }
  .g-fret { height: 1px; background: #d0d0d0; width: 100%; }
  .g-strings-wrap { position: absolute; inset: 0; display: flex; justify-content: space-between; padding: 4px 5px 0; }
  .g-str { width: 1px; background: #c0c0c0; height: 100%; }
  .g-dot { position: absolute; width: 15px; height: 15px; border-radius: 50%;
    background: var(--pur); transform: translate(-50%, -50%); }
  .g-open { position: absolute; width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid var(--txt); transform: translate(-50%, -50%); }
  .g-mute { position: absolute; font-size: 11px; font-weight: 800; color: var(--red);
    transform: translate(-50%, -50%); line-height: 1; }
  .chord-name-tag { font-size: 12px; font-weight: 800; color: var(--pur); }

  /* 피아노 */
  .piano-card { background: var(--surf); border: 1px solid var(--bdr); border-radius: 14px;
    padding: 10px 12px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .piano-notes { font-size: 11px; font-weight: 700; color: var(--pur); }
  .piano-wrap { position: relative; }
  .piano-keys { display: flex; gap: 1.5px; }
  .wkey { width: 20px; height: 58px; background: #fff; border: 1px solid #ddd;
    border-radius: 0 0 5px 5px; position: relative; display: flex; align-items: flex-end;
    justify-content: center; padding-bottom: 3px; }
  .wkey.lit { background: #6b5de722; border-color: var(--pur); }
  .wkey.root { background: var(--pur); border-color: var(--pur); }
  .wkey .kn { font-size: 7px; font-weight: 700; color: var(--dim); }
  .wkey.lit .kn { color: var(--pur); }
  .wkey.root .kn { color: #fff; }
  .bkeys-abs { position: absolute; top: 0; left: 0; pointer-events: none; }
  .bkey { position: absolute; width: 13px; height: 36px; background: #1c1c1e;
    border-radius: 0 0 4px 4px; top: 0; }
  .bkey.lit { background: var(--pur); }

  /* 타임라인 */
  .timeline-card { background: var(--surf); border: 1px solid var(--bdr); border-radius: 14px; overflow: hidden; }
  .tl-hd { font-size: 10px; font-weight: 800; color: var(--dim); letter-spacing: 0.05em;
    text-transform: uppercase; padding: 8px 12px; border-bottom: 1px solid var(--bdr); }
  .tl-scroll { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; padding: 8px 12px; }
  .tl-scroll::-webkit-scrollbar { display: none; }
  .tl-cell { flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
    padding: 5px 8px; border-radius: 8px; border: 1.5px solid transparent; min-width: 38px; cursor: pointer; }
  .tl-cell.past { color: var(--dim); }
  .tl-cell.past .tc { color: var(--dim); }
  .tl-cell.active { background: #6b5de712; border-color: var(--pur); }
  .tl-cell.active .tc { color: var(--pur); font-weight: 900; }
  .tc { font-size: 15px; font-weight: 800; color: var(--txt); line-height: 1; }
  .tt { font-size: 8px; color: var(--dim); font-weight: 600; margin-top: 2px; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-title">나로부터 시작되리</div>
  <div class="hdr-key">Key A</div>
</div>

<!-- 유튜브 미니 플레이어 -->
<div class="yt-mini">
  <div class="yt-thumb-mini">🎵</div>
  <div class="yt-info">
    <div class="yt-song">나로부터 시작되리 — 어노인팅</div>
    <div class="yt-progress"><div class="yt-fill"></div></div>
    <div class="yt-time">1:24 / 3:52</div>
  </div>
  <div class="yt-ctrl">
    <button class="yt-btn yt-skip-btn">⏮</button>
    <button class="yt-btn yt-play-btn">⏸</button>
    <button class="yt-btn yt-skip-btn">⏭</button>
  </div>
</div>

<!-- 메인 콘텐츠 -->
<div class="main">

  <!-- 현재 코드 크게 -->
  <div class="cur-card">
    <div class="cur-left">
      <div class="cur-label">지금 코드</div>
      <div class="cur-name">D</div>
      <div class="cur-sub">D · F# · A</div>
    </div>
    <div class="cur-right">
      <div class="next-box">
        <div class="next-lbl">다음</div>
        <div class="next-name">E</div>
      </div>
    </div>
  </div>

  <!-- 기타 + 피아노 다이어그램 -->
  <div class="diag-row">

    <!-- 기타 다이어그램 -->
    <div class="guitar-card">
      <div class="diag-title">🎸 기타</div>
      <div class="guitar-diag">
        <!-- 프렛 -->
        <div class="g-frets-wrap">
          <div class="g-nut"></div>
          <div class="g-fret-area">
            <div class="g-fret"></div>
            <div class="g-fret"></div>
            <div class="g-fret"></div>
            <div class="g-fret"></div>
          </div>
        </div>
        <!-- 줄 -->
        <div class="g-strings-wrap">
          <div class="g-str"></div><div class="g-str"></div>
          <div class="g-str"></div><div class="g-str"></div>
          <div class="g-str"></div><div class="g-str"></div>
        </div>
        <!-- D Major: xx0232 -->
        <!-- 줄 간격: 80px / 5 = 14px, 첫 줄 left=5px -->
        <div class="g-mute"  style="left:5px;top:-6px">×</div>
        <div class="g-mute"  style="left:19px;top:-6px">×</div>
        <div class="g-open"  style="left:33px;top:-6px"></div>
        <div class="g-dot"   style="left:47px;top:27px"></div>
        <div class="g-dot"   style="left:61px;top:43px"></div>
        <div class="g-dot"   style="left:75px;top:27px"></div>
      </div>
      <div class="chord-name-tag">D Major</div>
    </div>

    <!-- 피아노 다이어그램 -->
    <div class="piano-card">
      <div class="diag-title">🎹 피아노</div>
      <div class="piano-notes">D · F# · A</div>
      <div class="piano-wrap">
        <!-- 흰 건반: C D E F G A B C -->
        <!-- 각 흰 건반 width=20, gap=1.5 → 총폭 ≈ 169px -->
        <div class="piano-keys">
          <div class="wkey"><span class="kn">C</span></div>
          <div class="wkey root"><span class="kn" style="color:#fff">D</span></div>
          <div class="wkey"><span class="kn">E</span></div>
          <div class="wkey"><span class="kn">F</span></div>
          <div class="wkey"><span class="kn">G</span></div>
          <div class="wkey lit"><span class="kn">A</span></div>
          <div class="wkey"><span class="kn">B</span></div>
          <div class="wkey"><span class="kn">C</span></div>
        </div>
        <!-- 검은 건반 (절대 위치): C#=14, Eb=35.5, F#=78, Ab=99.5, Bb=121 -->
        <div class="bkeys-abs" style="width:169px;height:58px;position:relative;pointer-events:none">
          <div class="bkey" style="left:14px"></div>    <!-- C# -->
          <div class="bkey" style="left:35.5px"></div>  <!-- Eb -->
          <div class="bkey lit" style="left:78px"></div>  <!-- F# -->
          <div class="bkey" style="left:99.5px"></div>  <!-- Ab -->
          <div class="bkey" style="left:121px"></div>   <!-- Bb -->
        </div>
      </div>
    </div>

  </div>

  <!-- 전체 타임라인 -->
  <div class="timeline-card">
    <div class="tl-hd">📋 전체 코드 진행</div>
    <div class="tl-scroll">
      <div class="tl-cell past"><div class="tc">A</div><div class="tt">0:05</div></div>
      <div class="tl-cell past"><div class="tc">E</div><div class="tt">0:13</div></div>
      <div class="tl-cell past"><div class="tc">F#m</div><div class="tt">0:21</div></div>
      <div class="tl-cell past"><div class="tc">D</div><div class="tt">0:29</div></div>
      <div class="tl-cell past"><div class="tc">A</div><div class="tt">0:37</div></div>
      <div class="tl-cell past"><div class="tc">E</div><div class="tt">0:45</div></div>
      <div class="tl-cell active"><div class="tc">D</div><div class="tt">1:22</div></div>
      <div class="tl-cell"><div class="tc">E</div><div class="tt">1:30</div></div>
      <div class="tl-cell"><div class="tc">A</div><div class="tt">1:38</div></div>
      <div class="tl-cell"><div class="tc">F#m</div><div class="tt">1:46</div></div>
      <div class="tl-cell"><div class="tc">D</div><div class="tt">1:54</div></div>
      <div class="tl-cell"><div class="tc">E</div><div class="tt">2:02</div></div>
      <div class="tl-cell"><div class="tc">A</div><div class="tt">2:10</div></div>
    </div>
  </div>

</div>

</body>
</html>
