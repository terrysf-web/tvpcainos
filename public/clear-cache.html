<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캐시 초기화</title>
  <style>
    body { font-family: -apple-system, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f5f5f7; }
    .box { text-align:center; padding:32px; background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.1); max-width:320px; width:90%; }
    p { color:#555; font-size:15px; }
    .spinner { width:40px; height:40px; border:4px solid #e5e5e5; border-top-color:#6c47ff; border-radius:50%; animation:spin 0.8s linear infinite; margin:16px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>캐시를 초기화하고 있습니다…</p>
  </div>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch(e) {}
      window.location.replace('/?t=' + Date.now());
    })();
  </script>
</body>
</html>
