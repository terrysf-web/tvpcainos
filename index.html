<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TVPC Ainos Integrated Stable v1</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050608">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ainos Stable">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#app{
  margin:0;width:100%;height:100%;overflow:hidden;
  background:#f3f4f6;color:#111827;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
button,input,select,textarea{font:inherit}
button{border:0;border-radius:12px;padding:10px 14px;font-weight:900;background:#1f2937;color:#fff}
button.primary{background:#22c7d8;color:#031217}
button.blue{background:#2563eb}
button.gray{background:#e5e7eb;color:#111827}
button.red{background:#ef4444}
button.gold{background:#f59e0b;color:#111827}
button.small{font-size:12px;padding:8px 10px;border-radius:10px}
.app{height:100%;display:grid;grid-template-rows:auto 1fr}
.top{
  height:62px;padding:0 14px;padding-top:env(safe-area-inset-top);
  display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
  background:#050608;color:#fff;border-bottom:1px solid #222;
}
.logo{width:36px;height:36px;border-radius:10px;background:#22c7d8;color:#031217;display:grid;place-items:center;font-weight:1000}
.top-title{line-height:1.1;text-align:center}.top-title b{display:block;font-size:17px}.top-title span{display:block;color:#cbd5e1;font-size:12px;margin-top:4px}
.page{height:100%;overflow:auto;padding:16px}
.grid{display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;box-shadow:0 10px 28px rgba(15,23,42,.08);overflow:hidden}
.card-head{padding:14px 16px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;gap:10px}
.card-head h2{margin:0;font-size:17px}
.card-body{padding:14px;display:grid;gap:12px}
.field{display:grid;gap:6px}
.field label{font-size:12px;color:#64748b;font-weight:900}
.field input,.field select,.field textarea{border:1px solid #cbd5e1;border-radius:12px;padding:11px;background:#fff}
.row{
  display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;
  background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:12px;
}
.title{font-weight:950;font-size:15px}.meta{font-size:12px;color:#64748b;margin-top:4px}
.actions{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}
.list{display:grid;gap:10px}
.empty{padding:28px 10px;text-align:center;color:#64748b}
.badge{display:inline-block;background:#22c7d8;color:#031217;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:900;margin-left:6px}
.service-title{font-size:18px;font-weight:950}
.tabs{display:flex;gap:8px}
.tabs button{background:#1b1f26}
.tabs button.active{background:#22c7d8;color:#031217}
.viewer{
  position:fixed;inset:0;z-index:50;background:#111827;
  display:grid;grid-template-rows:auto 1fr auto;
  overscroll-behavior:none;
}
.vtop{
  height:60px;padding:0 12px;padding-top:env(safe-area-inset-top);
  background:#050608;color:#fff;display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;align-items:center;
}
.vtitle{text-align:center;min-width:0;line-height:1.1}
.vtitle b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px}
.vtitle span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;color:#cbd5e1;margin-top:3px}
.stage{
  position:relative;overflow:hidden;background:#e5e7eb;display:grid;place-items:center;
  touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
.sheet{
  position:relative;background:#fff;overflow:hidden;
  box-shadow:0 18px 60px rgba(0,0,0,.28);
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
#pdfCanvas{
  position:absolute;left:0;top:0;z-index:1;background:#fff;
  pointer-events:none!important;touch-action:none;
}
#inkCanvas{
  position:absolute;left:0;top:0;z-index:30;
  touch-action:none!important;-webkit-user-select:none!important;user-select:none!important;-webkit-touch-callout:none!important;
}
.viewer.read #inkCanvas{pointer-events:none}
.viewer.write #inkCanvas{pointer-events:auto!important}
.vbottom{
  height:70px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));
  background:#050608;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;
}
.vbottom button{border-radius:14px}
.hint{
  position:absolute;bottom:calc(84px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.68);color:#fff;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900;z-index:60;
}
.toast{
  position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);
  background:rgba(15,23,42,.94);color:white;border-radius:999px;padding:10px 14px;font-size:13px;font-weight:900;z-index:200;
}
.write-lock{position:absolute;inset:0;z-index:20;background:transparent;pointer-events:none;touch-action:none}
.viewer.write .write-lock{pointer-events:auto}
@media(max-width:900px){.grid{grid-template-columns:1fr}.page{padding:12px}.vbottom{grid-template-columns:1fr 1fr}.vbottom button{font-size:13px}}
</style>

<style id="startfix-dual-css">
.dualWrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;gap:16px}
.vtop{background:#050608!important}
.stage{background:#1f2937!important;padding:10px 14px!important}
#pdfBox2{position:relative;overflow:hidden;background:#fff;box-shadow:0 18px 50px rgba(0,0,0,.25)}
#pdfCanvas2{display:block;background:#fff}
</style>

</head>
<body>
<div id="app"></div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
const BUILD="AINOS_INTEGRATED_STABLE_V1";
const DB="tvpc_ainos_integrated_stable_v1", STORE="pdfs";
let dbp=null;
function openDB(){if(dbp)return dbp;dbp=new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});return dbp}
async function putFile(id,data){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).put(data,id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})}
async function getFile(id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readonly");const r=tx.objectStore(STORE).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
const $=s=>document.querySelector(s), app=$("#app");
const state={
 tab:"service",
 songs:JSON.parse(localStorage.getItem("ais_songs")||"[]"),
 services:JSON.parse(localStorage.getItem("ais_services")||"[]"),
 currentService:localStorage.getItem("ais_current_service")||null,
 viewer:null,pdf:null,mode:"read",page:1,total:1,draw:false,pts:[],startX:0,startY:0,color:"#ef4444",width:3
};
if(!state.services.length){const id="svc_"+Date.now();state.services=[{id,name:"Sunday Service",date:new Date().toISOString().slice(0,10),songs:[]}];state.currentService=id;save();}
function save(){localStorage.setItem("ais_songs",JSON.stringify(state.songs));localStorage.setItem("ais_services",JSON.stringify(state.services));if(state.currentService)localStorage.setItem("ais_current_service",state.currentService)}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function esc(s){return(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function toast(m){const old=$(".toast");if(old)old.remove();const t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1700)}
function fileData(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}
function currentSvc(){return state.services.find(s=>s.id===state.currentService)||state.services[0]}
function render(){if(state.viewer)return renderViewer();const svc=currentSvc();app.innerHTML=`<div class="app"><div class="top"><div class="logo">A</div><div class="top-title"><b>TVPC Ainos <span class="badge">Integrated Stable v1</span></b><span>${esc(svc.name)} · ${esc(svc.date||"")}</span></div><button class="primary" onclick="share()">Share</button></div><div class="page"><div class="grid"><section class="card"><div class="card-head"><h2>Services</h2><button class="gray small" onclick="newService()">New</button></div><div class="card-body">${servicesHTML()}</div></section><section class="card"><div class="card-head"><h2>${state.tab==='service'?'Service Setlist':'Song Library'}</h2><div class="tabs"><button class="${state.tab==='service'?'active':''} small" onclick="state.tab='service';render()">Service</button><button class="${state.tab==='library'?'active':''} small" onclick="state.tab='library';render()">Library</button></div></div><div class="card-body">${state.tab==='service'?serviceHTML():libraryHTML()}</div></section></div></div></div>`}
function servicesHTML(){return `<div class="field"><label>Service Name</label><input value="${esc(currentSvc().name)}" onchange="currentSvc().name=this.value;save();render()"></div><div class="field"><label>Date</label><input type="date" value="${esc(currentSvc().date||"")}" onchange="currentSvc().date=this.value;save();render()"></div><div class="list">${state.services.map(s=>`<div class="row"><div><div class="title">${esc(s.name)}</div><div class="meta">${esc(s.date||"")} · ${s.songs.length} songs</div></div><div class="actions"><button class="${s.id===state.currentService?'primary':'gray'} small" onclick="state.currentService='${s.id}';save();render()">Open</button><button class="red small" onclick="deleteService('${s.id}')">Delete</button></div></div>`).join("")}</div>`}
function serviceHTML(){const svc=currentSvc();return `<div class="service-title">${esc(svc.name)}</div><div class="meta">${esc(svc.date||"")}</div><div class="list">${svc.songs.map((id,i)=>{const s=state.songs.find(x=>x.id===id);return s?rowSong(s,true,i):""}).join("")||'<div class="empty">Library에서 곡을 추가하세요.</div>'}</div><button class="primary" onclick="startService()">Start Service</button>`}
function libraryHTML(){return `<div class="field"><label>Title</label><input id="title" placeholder="곡 제목"></div><div class="field"><label>Key</label><select id="key">${["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"].map(k=>`<option>${k}</option>`).join("")}</select></div><div class="field"><label>PDF</label><input id="pdf" type="file" accept="application/pdf"></div><button class="blue" onclick="addSong()">Add Song</button><div class="list">${state.songs.map(s=>rowSong(s,false)).join("")||'<div class="empty">곡을 추가하세요.</div>'}</div>`}
function rowSong(s,inSet,i=0){return `<div class="row"><div><div class="title">${esc(s.title)}</div><div class="meta">Key ${esc(s.key||"-")}</div></div><div class="actions">${inSet?`<button class="blue small" onclick="openViewer('${s.id}')">Open</button><button class="gray small" onclick="moveSong(${i},-1)">↑</button><button class="gray small" onclick="moveSong(${i},1)">↓</button><button class="red small" onclick="removeSong(${i})">Remove</button>`:`<button class="primary small" onclick="addToService('${s.id}')">Add</button><button class="gray small" onclick="openViewer('${s.id}')">Test</button><button class="red small" onclick="deleteSong('${s.id}')">Delete</button>`}</div></div>`}
function newService(){const id=uid();state.services.push({id,name:"New Service",date:new Date().toISOString().slice(0,10),songs:[]});state.currentService=id;save();render()}
function deleteService(id){if(state.services.length<=1)return toast("최소 1개 필요");if(!confirm("Service 삭제?"))return;state.services=state.services.filter(s=>s.id!==id);if(state.currentService===id)state.currentService=state.services[0].id;save();render()}
async function addSong(){const title=$("#title").value.trim(),key=$("#key").value,f=$("#pdf").files[0];if(!title||!f)return toast("Title/PDF 필요");const id=uid();await putFile(id,await fileData(f));state.songs.push({id,title,key,ink:{},zoom:1});save();render();toast("곡 추가됨")}
function deleteSong(id){if(!confirm("곡 삭제?"))return;state.songs=state.songs.filter(s=>s.id!==id);state.services.forEach(s=>s.songs=s.songs.filter(x=>x!==id));save();render()}
function addToService(id){currentSvc().songs.push(id);save();state.tab="service";render();toast("Service에 추가됨")}
function removeSong(i){currentSvc().songs.splice(i,1);save();render()}
function moveSong(i,d){const arr=currentSvc().songs,j=i+d;if(j<0||j>=arr.length)return;[arr[i],arr[j]]=[arr[j],arr[i]];save();render()}
function startService(){const svc=currentSvc();if(!svc.songs.length)return toast("Setlist 없음");openViewer(svc.songs[0])}
async function openViewer(id){const data=await getFile(id);if(!data)return toast("PDF 없음");state.viewer={id};state.mode="read";state.page=1;state.pdf=null;render();state.pdf=await pdfjsLib.getDocument(data).promise;state.total=state.pdf.numPages;await drawAll()}
function closeViewer(){save();state.viewer=null;state.pdf=null;render()}
function currentSong(){return state.songs.find(s=>s.id===state.viewer.id)}
function renderViewer(){
  const s=state.songs.find(x=>x.id===state.viewer.id), idx=state.set.indexOf(s.id);
  if(state.viewMode!=="dual"){
    app.innerHTML=`<div class="viewer ${state.write?'write':'read'}"><div class="vtop"><button class="gray" onclick="closeViewer()">Back</button><div class="vtitle"><b>${esc(s.title)}</b><span>${idx+1}/${state.set.length} · Page ${state.page}/${state.total} · Key ${esc(s.key||'-')}</span></div><button class="mode ${state.write?'on':''}" onclick="toggleWrite()">${state.write?'WRITE ON':'READ'}</button><button class="gray" onclick="toggleDual()">1 PAGE</button><button class="red" onclick="clearInk()">Clear Ink</button></div><div id="stage" class="stage" ontouchstart="swipeStart(event)" ontouchend="swipeEnd(event)"><div id="pdfBox" class="pdfBox"><canvas id="pdfCanvas"></canvas><canvas id="inkCanvas"></canvas></div><div class="hint">${state.write?'Write Mode: 필기만 가능':'Read Mode: swipe 가능'}</div></div><div class="vbottom"><button onclick="go(-1)">◀ PREV</button><button class="${state.write?'mode on':'mode'}" onclick="toggleWrite()">${state.write?'쓰기 켜짐':'쓰기 모드'}</button><button class="gray" onclick="toggleDual()">2 Page</button><button class="primary" onclick="go(1)">NEXT ▶</button></div></div>`;
    setTimeout(()=>{if(state.pdf){drawPdf().then(loadInk)}},0);
    return;
  }
  app.innerHTML=`<div class="viewer read"><div class="vtop"><button class="gray" onclick="closeViewer()">Back</button><div class="vtitle"><b>${esc(s.title)}</b><span>${idx+1}/${state.set.length} · Dual View · Key ${esc(s.key||'-')}</span></div><button class="gray" onclick="toggleDual()">2 PAGE</button><button class="red" onclick="toast('Dual read-only test')">Read Only</button></div><div id="stage" class="stage" ontouchstart="swipeStart(event)" ontouchend="swipeEnd(event)"><div id="dualWrap" class="dualWrap"><div id="pdfBox" class="pdfBox"><canvas id="pdfCanvas"></canvas><canvas id="inkCanvas"></canvas></div><div id="pdfBox2"><canvas id="pdfCanvas2"></canvas></div></div><div class="hint">Dual Read Mode</div></div><div class="vbottom"><button onclick="go(-1)">◀ PREV</button><button class="gray" onclick="toggleDual()">1 Page</button><button class="primary" onclick="go(1)">NEXT ▶</button></div></div>`;
  setTimeout(()=>{if(state.pdf){drawDualPages()}},0);
}
async function drawDualPages(){
  await drawPdf();
  const i=state.set.indexOf(state.viewer.id);
  const nextId=state.set[i+1];
  const canvas2=document.getElementById("pdfCanvas2");
  const box2=document.getElementById("pdfBox2");
  const stage=document.getElementById("stage");
  if(!canvas2||!box2||!nextId)return;
  const data=await getFile(nextId);
  if(!data)return;
  const nextPdf=await pdfjsLib.getDocument(data).promise;
  const page=await nextPdf.getPage(1);
  const base=page.getViewport({scale:1});
  const fit=Math.min((stage.clientWidth/2-30)/base.width,(stage.clientHeight-20)/base.height);
  const vp=page.getViewport({scale:fit});
  const dpr=window.devicePixelRatio||1;
  box2.style.width=Math.round(vp.width)+"px";
  box2.style.height=Math.round(vp.height)+"px";
  canvas2.width=Math.round(vp.width*dpr);
  canvas2.height=Math.round(vp.height*dpr);
  canvas2.style.width=Math.round(vp.width)+"px";
  canvas2.style.height=Math.round(vp.height)+"px";
  const ctx=canvas2.getContext("2d",{alpha:false});
  ctx.setTransform(dpr,0,0,dpr,0,0);
  await page.render({canvasContext:ctx,viewport:vp}).promise;
}
function toggleDual(){
  if(state.write)return toast("Write Mode에서는 2 Page 변경 잠김");
  state.viewMode=state.viewMode==="dual"?"single":"dual";
  localStorage.setItem("tvpc_ainos_dual_mode",state.viewMode);
  renderViewer();
}
async function drawPdf(){const page=await state.pdf.getPage(state.page),stage=$("#stage"),pdf=$("#pdfCanvas"),ink=$("#inkCanvas"),sheet=$("#sheet"),lock=$("#writeLock");if(!stage||!pdf||!ink)return;const base=page.getViewport({scale:1});const fit=Math.min(stage.clientWidth/base.width,stage.clientHeight/base.height)*(currentSong().zoom||1);const vp=page.getViewport({scale:fit});const dpr=window.devicePixelRatio||1;sheet.style.width=Math.round(vp.width)+"px";sheet.style.height=Math.round(vp.height)+"px";[pdf,ink].forEach(c=>{c.width=Math.round(vp.width*dpr);c.height=Math.round(vp.height*dpr);c.style.width=Math.round(vp.width)+"px";c.style.height=Math.round(vp.height)+"px"});if(lock){lock.style.width=Math.round(vp.width)+"px";lock.style.height=Math.round(vp.height)+"px"}const ctx=pdf.getContext("2d",{alpha:false});ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,pdf.width,pdf.height);await page.render({canvasContext:ctx,viewport:vp}).promise}
function blockEvent(e){if(state.mode==="write"){try{e.preventDefault()}catch{};try{e.stopPropagation()}catch{};try{e.stopImmediatePropagation&&e.stopImmediatePropagation()}catch{};return false}}
function setupWriteLock(){const lock=$("#writeLock");if(!lock)return;["touchstart","touchmove","touchend","click","contextmenu","gesturestart","gesturechange","gestureend"].forEach(type=>lock.addEventListener(type,blockEvent,{passive:false,capture:true}))}
function setupInk(){const c=$("#inkCanvas");if(!c)return;c.onpointerdown=penDown;c.onpointermove=penMove;c.onpointerup=penUp;c.onpointercancel=penUp;c.onpointerleave=null;["touchstart","touchmove","touchend","gesturestart","contextmenu","click"].forEach(type=>c.addEventListener(type,e=>{if(state.mode==="write"){try{e.preventDefault()}catch{};try{e.stopPropagation()}catch{}}},{passive:false,capture:true}))}
function pageKey(){return "p"+state.page}
function pos(e){const r=$("#inkCanvas").getBoundingClientRect(),dpr=window.devicePixelRatio||1;return{x:(e.clientX-r.left)*dpr,y:(e.clientY-r.top)*dpr,p:e.pressure||0.5}}
function mid(a,b){return{x:(a.x+b.x)/2,y:(a.y+b.y)/2}}
function penDown(e){if(state.mode!=="write")return;e.preventDefault();e.stopPropagation();try{e.currentTarget.setPointerCapture(e.pointerId)}catch{}state.draw=true;state.pts=[pos(e)]}
function penMove(e){if(state.mode!=="write"||!state.draw)return;e.preventDefault();e.stopPropagation();const p=pos(e);state.pts.push(p);const n=state.pts.length;if(n<3){dot(p);return}const p0=state.pts[n-3],p1=state.pts[n-2],p2=state.pts[n-1],m1=mid(p0,p1),m2=mid(p1,p2);const ctx=$("#inkCanvas").getContext("2d",{desynchronized:true});ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=state.color;ctx.lineWidth=(state.width+Math.max(.2,p1.p)*2)*(window.devicePixelRatio||1);ctx.beginPath();ctx.moveTo(m1.x,m1.y);ctx.quadraticCurveTo(p1.x,p1.y,m2.x,m2.y);ctx.stroke()}
function penUp(e){if(!state.draw)return;e.preventDefault();e.stopPropagation();try{e.currentTarget.releasePointerCapture(e.pointerId)}catch{}state.draw=false;saveStroke(state.pts);state.pts=[]}
function dot(p){const ctx=$("#inkCanvas").getContext("2d");ctx.fillStyle=state.color;ctx.beginPath();ctx.arc(p.x,p.y,1.8*(window.devicePixelRatio||1),0,Math.PI*2);ctx.fill()}
function saveStroke(pts){const s=currentSong();s.ink=s.ink||{};s.ink[pageKey()]=s.ink[pageKey()]||[];s.ink[pageKey()].push({color:state.color,width:state.width,pts});save()}
function loadInk(){const s=currentSong(),strokes=(s.ink&&s.ink[pageKey()])||[],ctx=$("#inkCanvas").getContext("2d");ctx.clearRect(0,0,$("#inkCanvas").width,$("#inkCanvas").height);strokes.forEach(st=>{ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=st.color||"#ef4444";ctx.lineWidth=(st.width||3)*(window.devicePixelRatio||1);const pts=st.pts||[];for(let i=2;i<pts.length;i++){const p0=pts[i-2],p1=pts[i-1],p2=pts[i],m1=mid(p0,p1),m2=mid(p1,p2);ctx.beginPath();ctx.moveTo(m1.x,m1.y);ctx.quadraticCurveTo(p1.x,p1.y,m2.x,m2.y);ctx.stroke()}})}
function clearInk(){if(!confirm("현재 페이지 필기 삭제?"))return;const s=currentSong();if(s.ink)s.ink[pageKey()]=[];save();loadInk()}
function toggleMode(){state.mode=state.mode==="write"?"read":"write";renderViewer()}
function prev(){if(state.mode==="write")return toast("Write Mode에서는 이동 잠김");if(state.page>1){state.page--;renderViewer();return}const arr=currentSvc().songs,i=arr.indexOf(state.viewer.id);if(i>0)openViewer(arr[i-1]);else toast("첫 곡입니다")}
function next(){if(state.mode==="write")return toast("Write Mode에서는 이동 잠김");if(state.page<state.total){state.page++;renderViewer();return}const arr=currentSvc().songs,i=arr.indexOf(state.viewer.id);if(i>=0&&i<arr.length-1)openViewer(arr[i+1]);else toast("마지막입니다")}
function swipeStart(e){if(state.mode==="write"){try{e.preventDefault()}catch{};return}state.startX=e.changedTouches[0].clientX;state.startY=e.changedTouches[0].clientY}
function swipeEnd(e){if(state.mode==="write"){try{e.preventDefault()}catch{};return}const dx=e.changedTouches[0].clientX-state.startX,dy=e.changedTouches[0].clientY-state.startY;if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.3){dx<0?next():prev()}}
function zoomToggle(){const s=currentSong();s.zoom=s.zoom===1?1.25:1;save();renderViewer()}
function share(){const svc=currentSvc();const payload={v:1,name:svc.name,date:svc.date,songs:svc.songs.map(id=>{const s=state.songs.find(x=>x.id===id);return s?{id:s.id,title:s.title,key:s.key}:null}).filter(Boolean)};const url="https://terrysf-web.github.io/tvpcainos/index.html#share="+btoa(unescape(encodeURIComponent(JSON.stringify(payload))));navigator.clipboard?.writeText(url);toast("Share copied")}
["contextmenu","dragstart","gesturestart","gesturechange","gestureend"].forEach(type=>document.addEventListener(type,e=>{if(state.mode==="write"){try{e.preventDefault()}catch{};try{e.stopPropagation()}catch{}}},{passive:false,capture:true}));
window.addEventListener("resize",()=>{if(state.viewer)renderViewer()});
render();
</script>
</body>
</html>
