<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ainos v2</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <div class="app-title">Ainos v2</div>
      <div id="syncStatus" class="status">Local mode</div>
    </div>
    <nav class="tabs" aria-label="Main navigation">
      <button class="tab active" data-view="libraryView">Library</button>
      <button class="tab" data-view="dualView">Dual</button>
      <button class="tab" data-view="notesView">Notes</button>
    </nav>
  </header>

  <main class="layout">
    <section id="libraryView" class="view active">
      <div class="panel">
        <h1>라이브러리</h1>
        <p class="muted">곡/악보/PDF를 여기서 관리합니다. Firebase가 안 되면 자동으로 LocalStorage로 저장됩니다.</p>
        <form id="addItemForm" class="form-grid">
          <input id="itemTitle" placeholder="제목 예: 주 예수보다 더 귀한 것은 없네" required />
          <input id="itemKey" placeholder="Key 예: C, G, A" />
          <input id="itemUrl" placeholder="PDF 또는 악보 URL" />
          <button type="submit">Add</button>
        </form>
        <div id="libraryList" class="card-list"></div>
      </div>
    </section>

    <section id="dualView" class="view">
      <div class="dual-toolbar">
        <button id="swapDual">좌/우 바꾸기</button>
        <button id="clearRight">오른쪽 비우기</button>
      </div>
      <div class="dual-grid">
        <article class="pane">
          <h2>Left</h2>
          <div id="leftPane" class="viewer empty">라이브러리에서 항목을 선택하세요.</div>
        </article>
        <article class="pane">
          <h2>Right</h2>
          <div id="rightPane" class="viewer empty">두 번째 항목을 선택하면 듀얼로 표시됩니다.</div>
        </article>
      </div>
    </section>

    <section id="notesView" class="view">
      <div class="panel notes-panel">
        <h1>필기</h1>
        <p class="muted">현재는 안정성을 위해 간단한 캔버스 필기부터 분리했습니다. PDF 위 오버레이는 다음 단계에서 붙이면 됩니다.</p>
        <div class="note-toolbar">
          <button id="penBlack">검정</button>
          <button id="penRed">빨강</button>
          <button id="eraser">지우개</button>
          <button id="clearCanvas">전체 지우기</button>
        </div>
        <div class="upload-box">
  <input type="text" id="songTitle" placeholder="Song Title">
  <input type="text" id="songKey" placeholder="Key">
  <input type="file" id="pdfFile" accept="application/pdf">
  <button id="uploadBtn">Upload</button>
</div>

<script type="module" src="./js/upload.js"></script>
        <canvas id="noteCanvas" width="1200" height="800"></canvas>
      </div>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
