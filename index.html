<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TVPC Pen Test v1</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#app{margin:0;width:100%;height:100%;overflow:hidden;background:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
#app{display:grid;grid-template-rows:auto 1fr auto}
.top{background:#050608;color:white;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;font-weight:900}
.top span{display:block;color:#22c7d8;font-size:12px;margin-top:3px}
.stage{position:relative;background:#f8fafc;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.bottom{display:flex;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:#050608}
button{border:0;border-radius:12px;padding:10px 14px;font-weight:900;background:#22c7d8;color:#031217}
button.gray{background:#374151;color:white}
.status{color:white;font-size:13px;display:flex;align-items:center;margin-left:auto}
</style>
</head>
<body>
<div id="app">
  <div class="top">TVPC Pen Test v1 <span>이 화면이 보이면 새 파일이 정상 업로드된 것입니다. PDF/앱 로직 없이 순수 canvas 필기 테스트입니다.</span></div>
  <div class="stage"><canvas id="c"></canvas></div>
  <div class="bottom">
    <button onclick="clearCanvas()">Clear</button>
    <button class="gray" onclick="toggleColor()">Color</button>
    <div class="status" id="status">Ready</div>
  </div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d',{alpha:true,desynchronized:true});
const status=document.getElementById('status');
let drawing=false,last=null,color='#ef4444',points=0;

function resize(){
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  const old=ctx.getImageData(0,0,Math.max(1,canvas.width),Math.max(1,canvas.height));
  canvas.width=Math.round(rect.width*dpr);
  canvas.height=Math.round(rect.height*dpr);
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=color;ctx.lineWidth=3*dpr;
}
window.addEventListener('resize',resize);
setTimeout(resize,50);

function pos(e){
  const r=canvas.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  return {x:(e.clientX-r.left)*dpr,y:(e.clientY-r.top)*dpr};
}
function down(e){
  e.preventDefault();
  try{canvas.setPointerCapture(e.pointerId)}catch{}
  drawing=true;last=pos(e);points=0;
  ctx.strokeStyle=color;
  status.textContent='Drawing: '+(e.pointerType||'touch');
}
function move(e){
  if(!drawing)return;
  e.preventDefault();
  const p=pos(e);
  ctx.beginPath();
  ctx.moveTo(last.x,last.y);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
  last=p;points++;
  if(points%10===0)status.textContent='Drawing points: '+points;
}
function up(e){
  if(!drawing)return;
  e.preventDefault();
  try{canvas.releasePointerCapture(e.pointerId)}catch{}
  drawing=false;last=null;
  status.textContent='Done points: '+points;
}
canvas.addEventListener('pointerdown',down,{passive:false});
canvas.addEventListener('pointermove',move,{passive:false});
canvas.addEventListener('pointerup',up,{passive:false});
canvas.addEventListener('pointercancel',up,{passive:false});
canvas.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
canvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height);status.textContent='Cleared'}
function toggleColor(){color=color==='#ef4444'?'#2563eb':'#ef4444';ctx.strokeStyle=color;status.textContent='Color changed'}
</script>
</body>
</html>
