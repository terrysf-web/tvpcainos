<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/><title>TVPC Worship Charts MVP</title><style>:root{--bg:#05070b;--panel:#09090b;--card:#18181b;--border:#27272a;--text:#fff;--muted:#a1a1aa;--cyan:#22d3ee}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body,#app{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}.app{height:100dvh;width:100vw;display:grid;grid-template-rows:calc(56px + env(safe-area-inset-top)) 1fr calc(80px + env(safe-area-inset-bottom))}.header{padding:env(safe-area-inset-top) 10px 0;display:grid;grid-template-columns:48px 1fr 48px;align-items:center;border-bottom:1px solid var(--border);background:#09090b}.btn{border:0;border-radius:16px;font-weight:900;cursor:pointer}.icon{width:44px;height:44px;background:var(--card);color:white;border:1px solid var(--border);font-size:26px}.title{text-align:center;overflow:hidden}.title b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title span{font-size:12px;color:var(--muted)}.viewer{overflow:hidden;background:#111827;position:relative}.viewer iframe{width:100%;height:100%;border:0;background:white}.chart{height:100%;overflow:auto;padding:28px;background:#020617}.songName{font-size:clamp(42px,7vw,78px);font-weight:1000;line-height:1}.key{color:var(--muted);font-weight:800;margin:8px 0 30px}.row{margin-bottom:28px}.chord,.lyric{margin:0;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:clamp(30px,4.8vw,54px)}.chord{color:var(--cyan);font-weight:1000}.lyric{font-weight:750;line-height:1.18}.footer{padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:12px;border-top:1px solid var(--border);background:#09090b}.nav{font-size:20px;background:#27272a;color:white;border:1px solid #3f3f46}.next{background:var(--cyan);color:#06202a}.drawerBg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10;display:none}.drawerBg.open{display:block}.drawer{width:min(88vw,400px);height:100%;background:#09090b;border-right:1px solid var(--border);padding:calc(16px + env(safe-area-inset-top)) 16px 16px;overflow:auto}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.eyebrow{font-size:12px;color:var(--cyan);letter-spacing:3px;font-weight:900}.h1{font-size:26px;font-weight:1000}.card{width:100%;text-align:left;border-radius:18px;padding:15px;background:var(--card);border:1px solid var(--border);color:white;margin-bottom:10px}.card.active{background:var(--cyan);color:#06202a}.action{width:100%;padding:13px;border-radius:16px;background:var(--cyan);color:#06202a;font-weight:1000;border:0;margin:8px 0}.field{width:100%;padding:12px;border-radius:14px;background:#020617;color:white;border:1px solid var(--border);margin-bottom:8px}.editPanel{position:fixed;right:12px;top:calc(66px + env(safe-area-inset-top));z-index:8;width:min(360px,calc(100vw - 24px));background:rgba(9,9,11,.96);border:1px solid var(--border);border-radius:24px;padding:14px;display:none}.editPanel.open{display:block}.note{width:100%;min-height:110px;background:#020617;color:white;border:1px solid var(--border);border-radius:16px;padding:12px}</style></head><body><div id="app" class="app"><header class="header"><button id="menu" class="btn icon">☰</button><div class="title"><b id="title"></b><span id="sub"></span></div><button id="edit" class="btn icon">✎</button></header><main id="viewer" class="viewer"></main><footer class="footer"><button id="prev" class="btn nav">◀ PREV</button><button id="next" class="btn nav next">NEXT ▶</button></footer><div id="drawerBg" class="drawerBg"><aside class="drawer" onclick="event.stopPropagation()"><div class="head"><div><div class="eyebrow">TVPC WORSHIP</div><div class="h1">Services</div></div><button id="close" class="btn icon">✕</button></div><button id="addService" class="action">+ Service</button><div id="services"></div><div class="eyebrow" style="margin:22px 0 10px">SONGS</div><button id="addSong" class="action">+ Add Song</button><div id="songs"></div><div class="eyebrow" style="margin:22px 0 10px">CURRENT SONG</div><div id="form"></div></aside></div><section id="editPanel" class="editPanel"><div class="eyebrow">EDIT NOTE</div><textarea id="note" class="note" placeholder="Personal note..."></textarea><button id="saveNote" class="action">Save Note</button></section></div><script>const demoPdf="https://mozilla.github.io/pdf.js/web/compressed.tracemonkey-pldi-09.pdf";let state=JSON.parse(localStorage.getItem("tvpc-mvp")||"null")||{si:0,gi:0,services:[{name:"Sunday Morning",date:"2026-05-17",songs:[{title:"Holy Forever",key:"G",pdf:demoPdf,note:"",chart:[["G        D/F#","A thousand generations"],["Em       C","Falling down in worship"]]},{title:"나는 믿네",key:"C",pdf:demoPdf,note:"",chart:[["C        G","나는 믿네 주의 선하심"],["Am       F","나를 이끄시는 하나님"]]}]}]};const $=id=>document.getElementById(id);const save=()=>localStorage.setItem("tvpc-mvp",JSON.stringify(state));const svc=()=>state.services[state.si];const song=()=>svc().songs[state.gi];function render(){let s=song();$("title").textContent=s?s.title:"No Song";$("sub").textContent=(svc()?.name||"Service")+(s?" · Key "+s.key:"");renderViewer();renderDrawer();$("note").value=s?.note||""}function renderViewer(){let s=song();if(!s){$("viewer").innerHTML='<div class="chart"><div class="songName">No Song</div></div>';return}if(s.pdf){$("viewer").innerHTML='<iframe src="'+s.pdf+'"></iframe>';return}$("viewer").innerHTML='<div class="chart"><div class="songName">'+esc(s.title)+'</div><div class="key">Key '+esc(s.key)+'</div>'+((s.chart||[]).map(r=>'<div class="row"><pre class="chord">'+esc(r[0])+'</pre><pre class="lyric">'+esc(r[1])+'</pre></div>').join(""))+(s.note?'<div style="color:var(--cyan);font-weight:900">'+esc(s.note)+'</div>':'')+'</div>'}function renderDrawer(){$("services").innerHTML=state.services.map((v,i)=>'<button class="card '+(i==state.si?'active':'')+'" onclick="state.si='+i+';state.gi=0;save();render()"><b>'+esc(v.date||"")+'</b><div>'+esc(v.name||"Service")+'</div></button>').join("");$("songs").innerHTML=(svc().songs||[]).map((v,i)=>'<button class="card '+(i==state.gi?'active':'')+'" onclick="state.gi='+i+';save();closeDrawer();render()"><b>'+(i+1)+'. '+esc(v.title)+'</b><div>Key '+esc(v.key)+'</div></button>').join("");let s=song();$("form").innerHTML=s?'<input class="field" id="songTitleInput" value="'+attr(s.title)+'" placeholder="Song title"><input class="field" id="songKeyInput" value="'+attr(s.key)+'" placeholder="Key"><input class="field" id="songPdfInput" value="'+attr(s.pdf||"")+'" placeholder="PDF URL"><button class="action" onclick="song().pdf=\'\';save();render()">Use Chart View</button>':'No song';setTimeout(bindInputs,0)}function bindInputs(){let a=$("songTitleInput"),b=$("songKeyInput"),c=$("songPdfInput");if(a)a.oninput=e=>{song().title=e.target.value;save();render()};if(b)b.oninput=e=>{song().key=e.target.value;save();render()};if(c)c.oninput=e=>{song().pdf=e.target.value;save();render()}}function next(){state.gi=Math.min(state.gi+1,(svc().songs||[]).length-1);save();render()}function prev(){state.gi=Math.max(state.gi-1,0);save();render()}$("next").onclick=next;$("prev").onclick=prev;$("menu").onclick=()=>drawerBg.classList.add("open");$("close").onclick=closeDrawer;$("drawerBg").onclick=closeDrawer;function closeDrawer(){drawerBg.classList.remove("open")}$("edit").onclick=()=>editPanel.classList.toggle("open");$("saveNote").onclick=()=>{song().note=$("note").value;save();render();editPanel.classList.remove("open")};$("addService").onclick=()=>{state.services.push({name:"New Service",date:new Date().toISOString().slice(0,10),songs:[]});state.si=state.services.length-1;state.gi=0;save();render()};$("addSong").onclick=()=>{svc().songs.push({title:"New Song",key:"C",pdf:demoPdf,note:"",chart:[["C        G","Lyrics here"]]});state.gi=svc().songs.length-1;save();render()};let sx=null;$("viewer").addEventListener("touchstart",e=>sx=e.touches[0].clientX,{passive:true});$("viewer").addEventListener("touchend",e=>{let dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>80){dx<0?next():prev()}sx=null},{passive:true});function esc(x){return String(x||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}function attr(x){return esc(x).replace(/`/g,"&#096;")}render();</script></body></html>
