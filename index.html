<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ainos v2</title>
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>

<header class="topbar">
  <div>
    <h1>Ainos v2</h1>
    <small>Firebase Connected</small>
  </div>

  <div class="nav-buttons">
    <button>Library</button>
    <button>Dual</button>
    <button>Notes</button>
  </div>
</header>

<main class="container">

  <section class="card">
    <h2>라이브러리</h2>

    <div class="upload-row">
      <input type="text" id="songTitle" placeholder="곡 제목">
      <input type="text" id="songKey" placeholder="Key">
      <input type="file" id="pdfFile" accept="application/pdf">
      <button id="uploadBtn">Upload PDF</button>
    </div>

    <div id="songList"></div>
  </section>

</main>

<script type="module" src="./js/upload.js"></script>

</body>
</html>
