<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TVPC Ainos</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#050608" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Ainos" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root{
      --bg:#f5f5f5;
      --ink:#0b0b0c;
      --bar:#050608;
      --bar2:#111317;
      --cyan:#27c7dd;
      --blue:#2563eb;
      --line:#e5e7eb;
      --muted:#64748b;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body,#app{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink)}
    button,input,select{font:inherit}
    button{border:0;border-radius:12px;padding:10px 14px;font-weight:800;background:#1f2937;color:white;cursor:pointer}
    button.primary{background:var(--cyan);color:#031217}
    button.blue{background:var(--blue);color:white}
    button.gray{background:#e5e7eb;color:#111827}
    button.danger{background:#ef4444;color:white}
    button.icon{width:42px;height:42px;border-radius:16px;padding:0;display:grid;place-items:center;background:#1b1d21;color:#fff}
    .hidden{display:none!important}

    .app{height:100%;display:grid;grid-template-rows:auto 1fr;background:#f7f7f7}
    .topbar{height:54px;padding:0 12px;padding-top:env(safe-area-inset-top);background:var(--bar);color:#fff;display:grid;grid-template-columns:auto 1fr auto;align-items:center;border-bottom:1px solid #202226}
    .top-title{text-align:center;line-height:1.1;min-width:0}
    .top-title b{display:block;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-title span{display:block;font-size:12px;color:#cbd5e1;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .page{height:100%;overflow:auto;padding:18px}
    .home-grid{display:grid;grid-template-columns:360px 1fr;gap:16px;height:100%}
    .panel{background:#fff;border:1px solid #e5e7eb;border-radius:20px;box-shadow:0 10px 28px rgba(15,23,42,.08);overflow:hidden}
    .panel-head{padding:14px 16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;justify-content:space-between}
    .panel-head h2{margin:0;font-size:17px}
    .panel-body{padding:14px;display:grid;gap:12px}
    .field{display:grid;gap:6px}
    .field label{font-size:12px;color:#64748b;font-weight:800}
    .field input,.field select{border:1px solid #cbd5e1;border-radius:12px;padding:11px 12px;background:#fff;min-width:0}
    .song-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px;border:1px solid #e5e7eb;border-radius:16px;background:#fff}
    .song-title{font-weight:900;font-size:15px}
    .song-meta{font-size:12px;color:#64748b;margin-top:4px}
    .song-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
    .smallbtn{padding:8px 10px;border-radius:10px;font-size:12px}
    .setlist{display:grid;gap:10px}
    .empty{color:#64748b;text-align:center;padding:26px 10px}
    .footer-actions{position:sticky;bottom:0;padding:14px;background:linear-gradient(transparent,#fff 24%);display:flex;gap:10px;justify-content:flex-end}

    .viewer{position:fixed;inset:0;z-index:99;background:#f3f3f3;display:grid;grid-template-rows:auto 1fr auto;overscroll-behavior-x:none}
    .viewer.service{touch-action:pan-y pinch-zoom}
    .viewer-top{height:54px;padding:0 12px;padding-top:env(safe-area-inset-top);background:#050608;color:#fff;display:grid;grid-template-columns:auto 1fr auto;align-items:center;border-bottom:1px solid #23262c}
    .viewer-title{text-align:center;line-height:1.1;min-width:0}
    .viewer-title b{display:block;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .viewer-title span{display:block;font-size:11px;color:#cbd5e1;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .viewer-stage{position:relative;min-height:0;overflow:hidden;display:grid;place-items:center;background:#f4f4f4;touch-action:pan-y pinch-zoom}
    .pdf-shell{position:relative;overflow:hidden;background:white;box-shadow:0 0 0 1px rgba(0,0,0,.08),0 18px 50px rgba(0,0,0,.20);max-width:100%;max-height:100%}
    canvas{display:block;background:white}
    .viewer-bottom{height:64px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:#050608;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .viewer-bottom button{border-radius:14px;font-size:16px}
    .viewer-bottom .prev{background:#2b2d31;color:#fff}
    .viewer-bottom .next{background:var(--cyan);color:#031217}
    .viewer.service .library-tools{display:none!important}
    .viewer.library .viewer-bottom{display:none}
    .library-tools{position:absolute;right:12px;top:calc(66px + env(safe-area-inset-top));z-index:100;display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.95);border-radius:18px;padding:8px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
    .library-tools button{padding:8px 10px;border-radius:10px;font-size:12px}
    .library-tools span{font-size:12px;font-weight:900}
    .crop-panel{position:absolute;right:12px;top:calc(124px + env(safe-area-inset-top));z-index:101;width:290px;max-width:calc(100vw - 24px);background:white;border-radius:18px;box-shadow:0 18px 60px rgba(0,0,0,.25);padding:14px;display:grid;gap:10px}
    .crop-panel h3{margin:0;font-size:15px}
    .crop-panel label{font-size:12px;font-weight:800;color:#334155;display:grid;gap:4px}
    .crop-panel input{width:100%}
    .service-hint{position:absolute;left:50%;bottom:calc(78px + env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(0,0,0,.62);color:white;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:800}
    .toast{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(15,23,42,.92);color:#fff;padding:10px 14px;border-radius:999px;z-index:200;font-size:13px;font-weight:800}
    .drawer{position:fixed;left:10px;top:calc(60px + env(safe-area-inset-top));width:310px;max-width:calc(100vw - 20px);max-height:calc(100vh - 90px);overflow:auto;background:#fff;border-radius:20px;z-index:150;box-shadow:0 20px 70px rgba(0,0,0,.32);border:1px solid #e5e7eb}
    .drawer h3{margin:0;padding:14px 16px;border-bottom:1px solid #e5e7eb}
    .drawer .song-row{border-radius:0;border-left:0;border-right:0;border-top:0}
    .chart-shell{width:min(980px,calc(100vw - 60px));max-height:100%;overflow:auto;background:white;border-radius:14px;box-shadow:0 0 0 1px rgba(0,0,0,.08),0 18px 50px rgba(0,0,0,.20);padding:34px 44px;font-size:22px;line-height:1.55}
    .chart-section{margin:0 0 26px}
    .chart-section h3{margin:0 0 10px;font-size:16px;color:#2563eb;text-transform:uppercase;letter-spacing:.05em}
    .chart-line{white-space:pre-wrap;font-weight:650;margin:7px 0}
    .chart-line .chord{color:#dc2626;font-weight:900;margin-right:3px}
    .viewer.service .chart-shell{width:min(1100px,calc(100vw - 40px));height:calc(100vh - 130px);border-radius:0;box-shadow:none;padding:42px 64px;font-size:24px}

    @media(max-width:900px){
      .home-grid{grid-template-columns:1fr;height:auto}
      .page{padding:12px}
      .topbar,.viewer-top{height:50px}
      .viewer-bottom{height:58px}
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const SHARE_BASE="https://terrysf-web.github.io/tvpcainos/index.html";
const DB_NAME="tvpcainos_pdf_db_v2";
const STORE="pdfs";
let dbp=null;

function openDB(){
  if(dbp) return dbp;
  dbp=new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=()=>req.result.createObjectStore(STORE);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
  return dbp;
}
async function putPDF(id,data){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).put(data,id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}
async function getPDF(id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readonly");const r=tx.objectStore(STORE).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function $(s,p=document){return p.querySelector(s)}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function esc(s){return (s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function fileData(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}


const SEEDED_SONGS = ([{id:1,title:"Amazing Grace",artist:"John Newton",key:"G",ki:7,bpm:72,ts:"3/4",sections:[{name:"Verse 1",lines:["[G]Amazing [G7]grace, how [C]sweet the [G]sound","That [G]saved a wretch like [D]me","I [G]once was [G7]lost, but [C]now am [G]found","Was [Em]blind, but [D]now I [G]see"]},{name:"Verse 2",lines:["'Twas [G]grace that [G7]taught my [C]heart to [G]fear","And [G]grace my fears re[D]lieved","How [G]precious [G7]did that [C]grace ap[G]pear","The [Em]hour I first be[D]lieved [G]"]}]},{id:2,title:"10,000 Reasons",artist:"Matt Redman",key:"G",ki:7,bpm:73,ts:"4/4",sections:[{name:"Chorus",lines:["[G]Bless the [D]Lord, O my [Em]soul, O my [C]soul","[G]Worship His [D]holy [C]name [G]","[G]Sing like never [D]before, O my [Em]soul","I'll [C]worship Your [G/B]holy [D]name"]},{name:"Verse 1",lines:["The [Em]sun comes [Bm]up, it's a new [C]day [G]dawning","It's [Em]time to [Bm]sing Your [C]song a[D]gain","What[Em]ever may [Bm]pass and what[C]ever lies be[G]fore me","Let [C]me be [G/B]singing when the [D]evening [G]comes"]}]},{id:3,title:"How Great Is Our God",artist:"Chris Tomlin",key:"G",ki:7,bpm:76,ts:"4/4",sections:[{name:"Verse 1",lines:["[G]The splendor of the [Em]King, clothed in ma[C]jesty","Let all the [D]earth rejoice, all the [G]earth rejoice","[G]He wraps Himself in [Em]light, and darkness [C]tries to hide"]},{name:"Chorus",lines:["How [G]great is our [D]God, sing with me","How [Em]great is our [C]God, and all will see","How [G]great, how [D]great [C]is our [G]God"]},{name:"Bridge",lines:["[G]Name above all names, [Em]worthy of all praise","[C]My heart will sing how [D]great is our [G]God"]}]},{id:4,title:"Blessed Be Your Name",artist:"Matt Redman",key:"A",ki:9,bpm:138,ts:"4/4",sections:[{name:"Verse 1",lines:["[A]Blessed be Your [E]name","In the [F#m]land that is [D]plentiful","Where Your [A]streams of abun[E]dance flow","[D]Blessed be Your [A]name"]},{name:"Chorus",lines:["[A]Blessed be the [E]name of the [F#m]Lord [D]","[A]Blessed be Your [E]glorious [D]name [A]","[A]Blessed be the [E]name of the [F#m]Lord [D]","[A]Blessed be Your [E]glorious [D]name"]}]},{id:5,title:"위대하신 주",artist:"워십팀",key:"G",ki:7,bpm:76,ts:"4/4",sections:[{name:"Verse 1",lines:["[G]주의 위대하심을 [Em]찬양해","[C]온 세상 그의 [D]것이요","[G]영원히 다스리시는 [Em]왕이시라","[C]주님만 [D]높이리"]},{name:"Chorus",lines:["[G]위대하신 주 [C]위대하신 주","[Em]노래해 [D]위대하신 주","[G]위대하신 주 [C]위대하신 주","[Em]영원히 [D]찬양받으실 [G]주"]}]},{id:6,title:"주를 찬양해",artist:"교회 워십",key:"D",ki:2,bpm:80,ts:"4/4",sections:[{name:"Verse 1",lines:["[D]거룩하신 주 [A]앞에 나아와","[Bm]두 손을 높이 [G]들어","[D]주의 이름을 [A]높여 드리며","[G]경배하리라 [A]"]},{name:"Chorus",lines:["[G]주를 [D/F#]찬양해 [Em]주를 [A]찬양해","[G]온 맘 다해 [D/F#]찬양해 [A]","[G]주를 [D/F#]찬양해 [Em]주를 [A]찬양해","[G]영원히 [A]찬양하리 [D]"]}]},{id:7,title:"주님 한 분만으로",artist:"예수전도단",key:"Bb",ki:10,bpm:68,ts:"4/4",sections:[{name:"Verse 1",lines:["[Bb]주님 한 분만으로 [F]난 만족해","[Gm]주님 한 분만으로 [Eb]족하네","[Bb]이 세상 그 무엇과도 [F]비교 못해"]},{name:"Chorus",lines:["[Eb]주님 [Bb/D]이름 [Cm]높이며 [F]찬양해","[Eb]주님 [Bb/D]앞에 [Cm]나아가 [F]경배해","[Bb]주님 [F]한 분만 [Eb]경배하리 [Bb]"]}]},{id:8,title:"Good Good Father",artist:"Chris Tomlin",key:"C",ki:0,bpm:68,ts:"4/4",sections:[{name:"Verse 1",lines:["[C]I've heard a thousand stories of what they [Am]think You're like","You're a [F]good good Father, it's [G]who You [C]are"]},{name:"Chorus",lines:["You're a [C]good good Father","It's [Am]who You are, it's [F]who You [C]are, it's [G]who You are","And I'm [C]loved by You","It's [Am]who I am, it's [F]who I [C]am, it's [G]who I am"]}]}]).map(s => ({...s, id: "seed-" + s.id, zoom: 1, crop: {l:0,r:0,t:0,b:0}, seeded: true}));
function initialSongs(){
  const saved = JSON.parse(localStorage.getItem("tvpcainos_songs_v2") || "[]");
  return saved.length ? saved : SEEDED_SONGS;
}

const state={
  tab:"service",
  songs:initialSongs(),
  setlist:JSON.parse(localStorage.getItem("tvpcainos_setlist_v2")||"[]"),
  serviceName:localStorage.getItem("tvpcainos_service_name_v2")||"Sunday Morning",
  viewer:null,
  pdf:null,
  page:1,
  renderTask:null,
  cropOpen:false,
  tx:0,ty:0,
  drawer:false
};

function save(){
  localStorage.setItem("tvpcainos_songs_v2",JSON.stringify(state.songs));
  localStorage.setItem("tvpcainos_setlist_v2",JSON.stringify(state.setlist));
  localStorage.setItem("tvpcainos_service_name_v2",state.serviceName);
}
function toast(msg){
  const old=$(".toast"); if(old) old.remove();
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(),1800);
}
function appHTML(){
  if(state.viewer) return viewerHTML();
  return `<div class="app">
    <div class="topbar">
      <button class="icon" onclick="state.drawer=!state.drawer;render()">☰</button>
      <div class="top-title"><b>Ainos Worship</b><span>${esc(state.serviceName)}</span></div>
      <button class="primary smallbtn" onclick="shareService()">Share</button>
    </div>
    <div class="page">
      <div class="home-grid">
        <section class="panel">
          <div class="panel-head"><h2>Song Library</h2><button class="gray smallbtn" onclick="state.tab='library';render()">관리</button></div>
          <div class="panel-body">${libraryMiniHTML()}</div>
        </section>
        <section class="panel">
          <div class="panel-head">
            <h2>Service Setlist</h2>
            <div class="field" style="margin:0;width:220px"><input value="${esc(state.serviceName)}" onchange="state.serviceName=this.value;save();render()" placeholder="Service name"></div>
          </div>
          <div class="panel-body">${setlistHTML()}</div>
        </section>
      </div>
    </div>
    ${state.drawer?drawerHTML():""}
  </div>`
}
function libraryMiniHTML(){
  return `<div class="field"><label>곡 제목</label><input id="newTitle" placeholder="예: 주님 한 분만으로"></div>
  <div class="field"><label>Key</label><select id="newKey">${["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"].map(k=>`<option>${k}</option>`).join("")}</select></div>
  <div class="field"><label>PDF 악보</label><input id="newPDF" type="file" accept="application/pdf"></div>
  <button class="blue" onclick="addSong()">Add Song</button>
  <hr style="border:0;border-top:1px solid #e5e7eb;width:100%">
  <div class="setlist">${state.songs.map(s=>songRowHTML(s,false)).join("") || `<div class="empty">Song Library가 비어 있습니다.</div>`}</div>`
}
function songRowHTML(s,inSet,idx=0){
  return `<div class="song-row">
    <div><div class="song-title">${esc(s.title)}</div><div class="song-meta">Key ${esc(s.key||"-")}</div></div>
    <div class="song-actions">
      ${!inSet?`<button class="primary smallbtn" onclick="addToSet('${s.id}')">추가</button><button class="gray smallbtn" onclick="openViewer('${s.id}','library')">Crop</button><button class="danger smallbtn" onclick="deleteSong('${s.id}')">삭제</button>`:
      `<button class="blue smallbtn" onclick="openViewer('${s.id}','service')">Open</button><button class="gray smallbtn" onclick="moveSet(${idx},-1)">↑</button><button class="gray smallbtn" onclick="moveSet(${idx},1)">↓</button><button class="danger smallbtn" onclick="removeSet(${idx})">제거</button>`}
    </div>
  </div>`
}
function setlistHTML(){
  const rows=state.setlist.map((id,i)=>{const s=state.songs.find(x=>x.id===id); return s?songRowHTML(s,true,i):""}).join("");
  return `<div class="setlist">${rows || `<div class="empty">Song Library에서 곡을 추가하세요.</div>`}</div>
  <div class="footer-actions">
    <button class="gray" onclick="clearSet()">Clear</button>
    <button class="primary" onclick="startService()">Start Service ▶</button>
  </div>`
}
function drawerHTML(){
  return `<div class="drawer"><h3>Service Songs</h3>${state.setlist.map((id,i)=>{const s=state.songs.find(x=>x.id===id);return s?`<div class="song-row" onclick="openViewer('${s.id}','service')"><div><div class="song-title">${i+1}. ${esc(s.title)}</div><div class="song-meta">Key ${esc(s.key||"-")}</div></div><button class="blue smallbtn">Open</button></div>`:""}).join("") || `<div class="empty">No songs</div>`}</div>`
}
function render(){document.getElementById("app").innerHTML=appHTML()}

async function addSong(){
  const title=$("#newTitle").value.trim(), key=$("#newKey").value, f=$("#newPDF").files[0];
  if(!title||!f) return toast("곡 제목과 PDF를 넣어주세요.");
  const id=uid(); const data=await fileData(f); await putPDF(id,data);
  state.songs.push({id,title,key,zoom:1,crop:{l:0,r:0,t:0,b:0},hasPdf:true,sections:[]});
  save(); render(); toast("곡이 추가되었습니다.");
}
function deleteSong(id){if(!confirm("삭제할까요?"))return;state.songs=state.songs.filter(s=>s.id!==id);state.setlist=state.setlist.filter(x=>x!==id);save();render()}
function addToSet(id){state.setlist.push(id);save();render();toast("Service에 추가되었습니다.")}
function removeSet(i){state.setlist.splice(i,1);save();render()}
function moveSet(i,d){const j=i+d;if(j<0||j>=state.setlist.length)return;[state.setlist[i],state.setlist[j]]=[state.setlist[j],state.setlist[i]];save();render()}
function clearSet(){if(confirm("Setlist를 비울까요?")){state.setlist=[];save();render()}}
function startService(){if(!state.setlist.length)return toast("Setlist가 비어 있습니다."); openViewer(state.setlist[0],"service")}


function renderChordLine(line){
  return esc(line).replace(/\[([^\]]+)\]/g, '<span class="chord">$1</span>');
}
function chartHTML(s){
  if(!s.sections || !s.sections.length) return '';
  return `<div class="chart-shell">${s.sections.map(sec=>`<div class="chart-section"><h3>${esc(sec.name||'Section')}</h3>${(sec.lines||[]).map(l=>`<div class="chart-line">${renderChordLine(l)}</div>`).join('')}</div>`).join('')}</div>`;
}
function stageContentHTML(s){
  if(s.sections && s.sections.length && !s.hasPdf) return chartHTML(s);
  return `${stageContentHTML(s)}`;
}

function viewerHTML(){
  const s=state.songs.find(x=>x.id===state.viewer.id);
  const mode=state.viewer.mode;
  const idx=state.setlist.indexOf(s.id);
  return `<div class="viewer ${mode}" id="viewer">
    <div class="viewer-top">
      <button class="icon" onclick="${mode==='service'?'state.drawer=!state.drawer;renderViewerOnly()':'closeViewer()'}">${mode==='service'?'☰':'←'}</button>
      <div class="viewer-title"><b>${esc(s.title)}</b><span>${esc(state.serviceName)} · Key ${esc(s.key||"-")}</span></div>
      <button class="icon" onclick="${mode==='service'?'toggleBlank()':'closeViewer()'}">${mode==='service'?'◒':'✕'}</button>
    </div>
    <div id="stage" class="viewer-stage" ontouchstart="touchStart(event)" ontouchmove="touchMove(event)" ontouchend="touchEnd(event)">
      ${stageContentHTML(s)}
      <div class="library-tools">
        <button class="gray" onclick="zoom(-.05)">−</button><span>${Math.round((s.zoom||1)*100)}%</span><button class="gray" onclick="zoom(.05)">+</button>
        <button class="gray" onclick="state.cropOpen=!state.cropOpen;renderViewerOnly();drawPDF()">Crop</button>
        <button class="blue" onclick="save();toast('저장되었습니다.')">저장</button>
        <button class="gray" onclick="resetCrop()">Reset</button>
      </div>
      ${mode==='library'&&state.cropOpen?cropPanel(s):""}
      ${mode==='service'?`<div class="service-hint">${idx+1} / ${state.setlist.length}</div>`:""}
    </div>
    <div class="viewer-bottom"><button class="prev" onclick="goSong(-1)">◀ PREV</button><button class="next" onclick="goSong(1)">NEXT ▶</button></div>
    ${state.drawer&&mode==='service'?drawerHTML():""}
  </div>`
}
function renderViewerOnly(){document.getElementById("app").innerHTML=viewerHTML(); if(state.pdf) setTimeout(drawPDF,0)}
function cropPanel(s){
  const c=s.crop||{l:0,r:0,t:0,b:0};
  const names={l:"Left",r:"Right",t:"Top",b:"Bottom"};
  return `<div class="crop-panel"><h3>Crop / 공백 제거</h3>${["l","r","t","b"].map(k=>`<label>${names[k]} <span id="${k}num">${c[k]}</span>%<input type="range" min="0" max="40" value="${c[k]}" oninput="setCrop('${k}',this.value)"></label>`).join("")}<button class="blue" onclick="save();toast('Crop 저장됨')">저장</button></div>`
}

async function openViewer(id,mode){
  const song=state.songs.find(x=>x.id===id);
  if(!song) return toast("곡을 찾을 수 없습니다.");
  state.viewer={id,mode}; state.pdf=null; state.page=1; state.drawer=false; render();
  const data=await getPDF(id);
  if(!data){
    song.hasPdf=false;
    renderViewerOnly();
    if(mode==="service") lockBack();
    return;
  }
  song.hasPdf=true;
  try{
    state.pdf=await pdfjsLib.getDocument(data).promise;
    renderViewerOnly();
    await drawPDF();
    if(mode==="service") lockBack();
  }catch(e){toast("PDF를 열 수 없습니다."); console.error(e)}
}
function closeViewer(){state.viewer=null;state.pdf=null;state.cropOpen=false;state.drawer=false;render()}
async function drawPDF(){
  if(!state.viewer||!state.pdf) return;
  const s=state.songs.find(x=>x.id===state.viewer.id);
  const page=await state.pdf.getPage(1);
  const stage=$("#stage"), shell=$("#pdfShell"), canvas=$("#pdfCanvas");
  if(!stage||!shell||!canvas)return;
  const ctx=canvas.getContext("2d");
  const base=page.getViewport({scale:1});
  const c=s.crop||{l:0,r:0,t:0,b:0};
  const cropW=base.width*(1-(c.l+c.r)/100), cropH=base.height*(1-(c.t+c.b)/100);
  const fit=Math.min(stage.clientWidth/cropW, stage.clientHeight/cropH)*(s.zoom||1);
  const vp=page.getViewport({scale:fit});
  canvas.width=Math.round(vp.width); canvas.height=Math.round(vp.height);
  canvas.style.width=canvas.width+"px"; canvas.style.height=canvas.height+"px";
  if(state.renderTask){try{state.renderTask.cancel()}catch(e){}}
  state.renderTask=page.render({canvasContext:ctx,viewport:vp});
  try{await state.renderTask.promise}catch(e){}
  const left=vp.width*c.l/100, top=vp.height*c.t/100, right=vp.width*c.r/100, bottom=vp.height*c.b/100;
  shell.style.width=Math.max(20,vp.width-left-right)+"px";
  shell.style.height=Math.max(20,vp.height-top-bottom)+"px";
  canvas.style.transform=`translate(${-left}px,${-top}px)`;
}
function setCrop(k,v){const s=state.songs.find(x=>x.id===state.viewer.id);s.crop=s.crop||{l:0,r:0,t:0,b:0};s.crop[k]=Number(v);const n=$("#"+k+"num");if(n)n.textContent=v;drawPDF()}
function zoom(d){const s=state.songs.find(x=>x.id===state.viewer.id);s.zoom=Math.max(.55,Math.min(2.2,(s.zoom||1)+d));save();renderViewerOnly()}
function resetCrop(){const s=state.songs.find(x=>x.id===state.viewer.id);s.crop={l:0,r:0,t:0,b:0};s.zoom=1;save();renderViewerOnly()}
function goSong(d){
  if(!state.viewer||state.viewer.mode!=="service")return;
  const i=state.setlist.indexOf(state.viewer.id), j=i+d;
  if(j<0||j>=state.setlist.length){toast(j<0?"첫 곡입니다.":"마지막 곡입니다.");return}
  openViewer(state.setlist[j],"service");
}
function lockBack(){
  try{
    history.pushState({locked:true},"",location.href);
    window.onpopstate=()=>{ if(state.viewer&&state.viewer.mode==="service") history.pushState({locked:true},"",location.href); };
  }catch(e){}
}
function touchStart(e){
  const t=e.changedTouches[0]; state.tx=t.clientX; state.ty=t.clientY;
  if(state.viewer&&state.viewer.mode==="service"&&state.tx<45) e.preventDefault();
}
function touchMove(e){
  if(state.viewer&&state.viewer.mode==="service"&&state.tx<45) e.preventDefault();
}
function touchEnd(e){
  if(!state.viewer||state.viewer.mode!=="service")return;
  const t=e.changedTouches[0], dx=t.clientX-state.tx, dy=t.clientY-state.ty;
  if(Math.abs(dx)>70 && Math.abs(dx)>Math.abs(dy)*1.2){ dx<0?goSong(1):goSong(-1); }
}
function toggleBlank(){toast("Service 화면은 편집 버튼이 없습니다.")}
function shareService(){
  const payload={v:2,date:new Date().toISOString().slice(0,10),name:state.serviceName,songs:state.setlist.map(id=>{const s=state.songs.find(x=>x.id===id);return s?{id:s.id,title:s.title,key:s.key}:null}).filter(Boolean)};
  const enc=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  const url=`${SHARE_BASE}#share=${enc}`;
  if(navigator.share) navigator.share({title:state.serviceName,url}).catch(()=>copy(url)); else copy(url);
}
function copy(url){navigator.clipboard&&navigator.clipboard.writeText(url);toast("Share 링크 복사됨")}
(function(){
  if(location.hash.startsWith("#share=")){
    try{
      const data=JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(7)))));
      state.serviceName=data.name||state.serviceName;
      toast("공유 setlist를 열었습니다. PDF는 각 iPad Library에 있어야 합니다.");
    }catch(e){}
  }
})();
render();
</script>
</body>
</html>
