<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TVPC Pen Test v2 Smooth</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.app{display:grid;grid-template-rows:auto 1fr auto;height:100%}
.top{background:#050608;color:white;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;font-weight:900}
.top span{display:block;color:#22c7d8;font-size:12px;margin-top:3px}
.stage{position:relative;background:#fafafa;overflow:hidden;touch-action:none}
canvas{
  position:absolute;inset:0;width:100%;height:100%;
  touch-action:none;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}
.bottom{
  display:flex;gap:10px;align-items:center;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  background:#050608;
}
button{
  border:0;border-radius:12px;padding:10px 14px;
  font-weight:900;background:#22c7d8;color:#031217
}
button.gray{background:#374151;color:white}
.status{margin-left:auto;color:white;font-size:13px}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    TVPC Pen Test v2 Smooth
    <span>Bezier smoothing + pressure support + pointer capture</span>
  </div>

  <div class="stage">
    <canvas id="c"></canvas>
  </div>

  <div class="bottom">
    <button onclick="clearCanvas()">Clear</button>
    <button class="gray" onclick="toggleColor()">Color</button>
    <div class="status" id="status">Ready</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {
  alpha: true,
  desynchronized: true
});

const status = document.getElementById('status');

let drawing = false;
let points = [];
let color = '#ef4444';

function resize(){
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();

  const img = document.createElement('canvas');
  img.width = canvas.width || 1;
  img.height = canvas.height || 1;
  img.getContext('2d').drawImage(canvas,0,0);

  canvas.width = Math.round(rect.width * dpr);
  canvas.height = Math.round(rect.height * dpr);

  ctx.drawImage(img,0,0,canvas.width,canvas.height);

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = color;
}

window.addEventListener('resize', resize);
setTimeout(resize, 50);

function pos(e){
  const r = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  return {
    x:(e.clientX-r.left)*dpr,
    y:(e.clientY-r.top)*dpr,
    p:e.pressure || 0.5
  };
}

function midpoint(a,b){
  return {
    x:(a.x+b.x)/2,
    y:(a.y+b.y)/2
  };
}

function down(e){
  e.preventDefault();

  try{
    canvas.setPointerCapture(e.pointerId);
  }catch(err){}

  drawing = true;
  points = [pos(e)];

  status.textContent = 'Drawing';
}

function move(e){
  if(!drawing) return;

  e.preventDefault();

  const p = pos(e);
  points.push(p);

  if(points.length < 3){
    drawDot(p);
    return;
  }

  const p0 = points[points.length-3];
  const p1 = points[points.length-2];
  const p2 = points[points.length-1];

  const m1 = midpoint(p0,p1);
  const m2 = midpoint(p1,p2);

  const pressure = Math.max(0.4, p1.p);
  const width = ((2 + pressure * 4) * (window.devicePixelRatio || 1));

  ctx.beginPath();
  ctx.lineWidth = width;
  ctx.strokeStyle = color;

  ctx.moveTo(m1.x,m1.y);
  ctx.quadraticCurveTo(p1.x,p1.y,m2.x,m2.y);
  ctx.stroke();
}

function up(e){
  if(!drawing) return;

  e.preventDefault();

  try{
    canvas.releasePointerCapture(e.pointerId);
  }catch(err){}

  drawing = false;
  points = [];

  status.textContent = 'Done';
}

function drawDot(p){
  ctx.beginPath();
  ctx.fillStyle = color;
  ctx.arc(p.x,p.y,2*(window.devicePixelRatio||1),0,Math.PI*2);
  ctx.fill();
}

canvas.addEventListener('pointerdown', down, {passive:false});
canvas.addEventListener('pointermove', move, {passive:false});
canvas.addEventListener('pointerup', up, {passive:false});
canvas.addEventListener('pointercancel', up, {passive:false});

canvas.addEventListener('touchstart', e=>e.preventDefault(), {passive:false});
canvas.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  status.textContent='Cleared';
}

function toggleColor(){
  color = color === '#ef4444' ? '#2563eb' : '#ef4444';
  status.textContent='Color changed';
}
</script>
</body>
</html>
