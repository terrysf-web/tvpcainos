<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e8a93e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TVPC Worship" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>TVPC Worship</title>
    <style>
      html { height: 100%; overflow: hidden; margin:0; padding:0; background:#e8e6e0; }
      body, #root { height: 100%; margin:0; padding:0; background:#e8e6e0; }
      * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
      input, textarea { -webkit-user-select: text; user-select: text; }
    </style>
    <script>
      // 서비스워커 캐시 충돌로 인한 흰 화면 자동 복구
      window.addEventListener("error", function(e) {
        if (e.target && (e.target.tagName === "SCRIPT" || e.target.tagName === "LINK")) {
          if ("caches" in window) {
            caches.keys().then(function(keys) {
              return Promise.all(keys.map(function(k) { return caches.delete(k); }));
            }).then(function() {
              if ("serviceWorker" in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                  return Promise.all(regs.map(function(r) { return r.unregister(); }));
                }).then(function() {
                  window.location.reload();
                });
              } else {
                window.location.reload();
              }
            });
          } else {
            window.location.reload();
          }
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous" async></script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
