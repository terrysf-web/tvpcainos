<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, setPersistence, browserLocalPersistence, signInAnonymously, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzXyQA-BbL_0KsTnukODBfMBkIZINxiNM",
  authDomain: "tvpcainos.firebaseapp.com",
  projectId: "tvpcainos",
  storageBucket: "tvpcainos.firebasestorage.app",
  messagingSenderId: "721441022829",
  appId: "1:721441022829:web:45a0ee8fc152090b09f064"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
setPersistence(auth, browserLocalPersistence).catch(e=>console.warn("Auth persistence failed", e));

async function ensureAuth(){
  if(auth.currentUser) return auth.currentUser;
  try { await signInAnonymously(auth); } catch(e) { console.warn("Anonymous auth failed", e); }
  return await new Promise(resolve=>{
    const unsub = onAuthStateChanged(auth, u=>{ unsub(); resolve(u); });
    setTimeout(()=>{ try{unsub()}catch{}; resolve(auth.currentUser); }, 2000);
  });
}

const DEFAULT_SONGS = [
  {id:"1",title:"Amazing Grace",artist:"John Newton",key:"G"},
  {id:"2",title:"10,000 Reasons",artist:"Matt Redman",key:"G"},
  {id:"3",title:"How Great Is Our God",artist:"Chris Tomlin",key:"G"},
  {id:"4",title:"Blessed Be Your Name",artist:"Matt Redman",key:"A"},
  {id:"5",title:"위대하신 주",artist:"워십팀",key:"G"},
  {id:"6",title:"주를 찬양해",artist:"교회 워십",key:"D"},
  {id:"7",title:"주님 한 분만으로",artist:"예수전도단",key:"Bb"},
  {id:"8",title:"Good Good Father",artist:"Chris Tomlin",key:"C"}
];

function norm(v){
  return String(v || "")
    .normalize("NFC")
    .replace(/\.pdf$/i,"")
    .replace(/\s+/g,"")
    .trim()
    .toLowerCase();
}

function dataStringToBytes(str){
  if(!str) return null;
  let body = String(str);
  const comma = body.indexOf(",");
  if(body.startsWith("data:") && comma >= 0) body = body.slice(comma + 1);
  body = body.replace(/\s/g,"");
  const bin = atob(body);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function loadChunks(id){
  await ensureAuth();
  const metaRef = doc(db, "pdfFiles", String(id));
  const metaSnap = await getDoc(metaRef);
  if(!metaSnap.exists()) return null;

  const meta = metaSnap.data();
  if(!meta || !meta.chunkCount) return null;

  const parts = [];
  for(let i=0;i<meta.chunkCount;i++){
    const chunkSnap = await getDoc(doc(db, "pdfFiles", String(id), "chunks", String(i)));
    if(chunkSnap.exists()) parts.push(chunkSnap.data().data || "");
  }

  const joined = parts.join("");
  const bytes = dataStringToBytes(joined);
  if(!bytes) return null;

  return { id:String(id), name:meta.name || "", data:bytes };
}

async function getAllSongs(){
  await ensureAuth();
  const customSnap = await getDocs(collection(db, "customSongs"));
  const custom = customSnap.docs.map(d=>({id:d.id, ...d.data(), custom:true}));
  const all = [...DEFAULT_SONGS, ...custom];

  const pdfSnap = await getDocs(collection(db, "pdfFiles"));
  const pdfMap = {};
  pdfSnap.docs.forEach(d=>{ pdfMap[String(d.id)] = d.data() || {}; });

  return all
    .filter(s => pdfMap[String(s.id)])
    .map(s => ({
      id:String(s.id),
      title:s.title || s.name || "Untitled",
      key:s.key || "",
      pdf:s.pdf || pdfMap[String(s.id)]?.name || "",
      firebasePdfId:String(s.id)
    }))
    .sort((a,b)=>(a.title||"").localeCompare(b.title||"", "ko"));
}

window.TVPC_FB_READY = Promise.resolve({
  async getSongs(){
    return await getAllSongs();
  },

  watchSongs(callback){
    const refresh = async()=>{
      try { callback(await getAllSongs()); } catch(e) { console.warn("watchSongs refresh failed", e); }
    };
    let unsubCustom=null, unsubPdf=null;
    ensureAuth().then(()=>{
      unsubCustom = onSnapshot(collection(db, "customSongs"), refresh, e=>console.warn(e));
      unsubPdf = onSnapshot(collection(db, "pdfFiles"), refresh, e=>console.warn(e));
      refresh();
    });
    return ()=>{ if(unsubCustom)unsubCustom(); if(unsubPdf)unsubPdf(); };
  },

  async login(){
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });
    return await signInWithPopup(auth, provider);
  },

  async logout(){
    return await signOut(auth);
  },

  getUser(){
    return auth.currentUser;
  },

  onUser(callback){
    return onAuthStateChanged(auth, callback);
  },

  async saveInk(songId, ink){
    await ensureAuth();
    const uid = auth.currentUser ? auth.currentUser.uid : "anonymous";
    await setDoc(doc(db, "userInk", uid, "songs", String(songId)), {
      songId:String(songId),
      ink: ink || {},
      updatedAt: Date.now()
    }, {merge:true});
  },

  async loadInk(songId){
    await ensureAuth();
    const uid = auth.currentUser ? auth.currentUser.uid : "anonymous";
    const snap = await getDoc(doc(db, "userInk", uid, "songs", String(songId)));
    return snap.exists() ? (snap.data().ink || {}) : {};
  },

  watchInk(songId, callback){
    const uid = auth.currentUser ? auth.currentUser.uid : "anonymous";
    return onSnapshot(doc(db, "userInk", uid, "songs", String(songId)), snap=>{
      callback(snap.exists() ? (snap.data().ink || {}) : {});
    });
  },

  async saveService(service){
    await ensureAuth();
    const id = service.id || ("svc_" + Date.now());
    await setDoc(doc(db, "services", String(id)), {
      id:String(id),
      name:service.name || "Service",
      date:service.date || "",
      songs:service.songs || [],
      updatedAt:Date.now()
    }, {merge:true});
    return id;
  },

  async getServices(){
    await ensureAuth();
    const snap = await getDocs(collection(db, "services"));
    return snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .filter(s=>!s.deleted)
      .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  },

  watchServices(callback){
    let unsub=null;
    const refresh = async()=>{
      try{ callback(await this.getServices()); }
      catch(e){ console.warn("watchServices refresh failed", e); }
    };
    ensureAuth().then(()=>{
      unsub = onSnapshot(collection(db, "services"), refresh, e=>console.warn("services snapshot failed",e));
      refresh();
    });
    return ()=>{ if(unsub)unsub(); };
  },

  async getPdfDataForSong(song){
    await ensureAuth();
    const candidates = [
      song.firebasePdfId,
      song.id,
      song.title,
      song.pdf,
      song.file,
      song.filename
    ].filter(Boolean);

    for(const id of candidates){
      const direct = await loadChunks(id).catch(e=>{console.warn("direct PDF load failed", id, e); return null;});
      if(direct) return direct;
    }

    const targetNames = new Set(candidates.map(norm).filter(Boolean));
    const all = await getDocs(collection(db, "pdfFiles"));
    for(const d of all.docs){
      const m = d.data() || {};
      const possible = [d.id, m.name].map(norm);
      if(possible.some(x => targetNames.has(x))){
        const found = await loadChunks(d.id).catch(e=>{console.warn("matched PDF load failed", d.id, e); return null;});
        if(found) return found;
      }
    }
    return null;
  }
});

window.TVPC_FB_READY.then(api=>{ window.TVPC_FB = api; console.log("TVPC Firebase library/PDF sync ready"); });
</script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
const BUILD="AINOS_LOGIN_STUCK_FIX_V6";
const SHARED_BASE="https://terrysf-web.github.io/tvpc-worship";
const SHARED_SONGS_URL=SHARED_BASE+"/data/songs.json?v="+Date.now();
function pdfUrlFor(song){
  const p = song.pdf || song.file || song.filename || "";
  if(!p) return "";
  if(p.startsWith("http")) return p;
  if(p.startsWith("pdfs/")){
    return SHARED_BASE + "/" + p.split("/").map(part=>encodeURIComponent(part)).join("/");
  }
  return SHARED_BASE + "/pdfs/" + encodeURIComponent(p);
}
const PDF_DOC_CACHE = new Map();

async function loadPdfDocForSong(song){
  const cacheKey = String(song.id || song.title || song.pdf || "");
  if(cacheKey && PDF_DOC_CACHE.has(cacheKey)) return PDF_DOC_CACHE.get(cacheKey);

  let pdfDoc = null;

  if(window.TVPC_FB&&window.TVPC_FB.getPdfDataForSong){
    const fbPdf = await window.TVPC_FB.getPdfDataForSong(song).catch(e=>{
      console.warn("Firebase PDF load failed", e);
      return null;
    });
    if(fbPdf&&fbPdf.data){
      pdfDoc = await pdfjsLib.getDocument({data:fbPdf.data}).promise;
    }
  }

  if(!pdfDoc){
    const url = pdfUrlFor(song);
    if(!url) throw new Error("PDF 경로 없음");
    pdfDoc = await pdfjsLib.getDocument(url).promise;
  }

  if(cacheKey) PDF_DOC_CACHE.set(cacheKey, pdfDoc);
  return pdfDoc;
}

function getNextSongForDual(currentId){
  const svc=currentSvc();
  const ids=(svc.songs||[]).map(x=>{const s=findSongByRef(x);return s?s.id:x});
  const idx=ids.indexOf(currentId);

  return findSongByRef(ids[idx+1]);
}

async function preloadNextPdf(currentId){
  try{
    const svc=currentSvc();
    const ids=(svc.songs||[]).map(x=>{const s=findSongByRef(x);return s?s.id:x});
    const idx=ids.indexOf(currentId);
    if(idx<0 || idx>=ids.length-1) return;
    const nextSong=findSongByRef(ids[idx+1]);
    if(!nextSong) return;
    const key=String(nextSong.id || nextSong.title || nextSong.pdf || "");
    if(key && PDF_DOC_CACHE.has(key)) return;
    await loadPdfDocForSong(nextSong);
  }catch(e){
    console.warn("Next PDF preload failed", e);
  }
}

function drawDualInk(dualPage=1){
  const ink=$("#dualInkCanvas");

  const ctx=ink.getContext("2d");
  ctx.clearRect(0,0,ink.width,ink.height);

  const song=findSongByRef(state.dualSong.id);
  if(!song) return;

  const strokes=(song.ink&&song.ink["p"+dualPage])||[];
  const dpr=window.devicePixelRatio||1;

  strokes.forEach(st=>{
    ctx.lineCap="round";
    ctx.lineJoin="round";
    ctx.strokeStyle=st.color||"#ef4444";
    ctx.lineWidth=(st.width||3)*dpr;
    const pts=denormalizeStrokePts(st.pts||[],ink);
    for(let i=2;i<pts.length;i++){
      const p0=pts[i-2],p1=pts[i-1],p2=pts[i],m1=mid(p0,p1),m2=mid(p1,p2);

      ctx.moveTo(m1.x,m1.y);
      ctx.quadraticCurveTo(p1.x,p1.y,m2.x,m2.y);
      ctx.stroke();
    }
  });
}

function denormalizeStrokePts(pts, canvas){
  const c=canvas || $("#inkCanvas");
  if(!pts || !c || !c.width || !c.height) return pts || [];
  return pts.map(p=>{
    const isNorm = p && p.x <= 1.5 && p.y <= 1.5;
    return isNorm ? {x:p.x*c.width,y:p.y*c.height,p:p.p||0.5} : p;
  });
}
function saveStroke(pts){
const s=currentSong();
if(!s)return;
s.ink=s.ink||{};
s.ink[pageKey()]=s.ink[pageKey()]||[];
s.ink[pageKey()].push({color:state.color,width:state.width,pts:normalizeStrokePts(pts),normalized:true});
persistSongInk(s);
save();
}
function loadInk(){
const canvas=$("#inkCanvas");
const s=currentSong(),strokes=(s&&s.ink&&s.ink[pageKey()])||[],ctx=canvas.getContext("2d");
ctx.clearRect(0,0,canvas.width,canvas.height);
strokes.forEach(st=>{
  ctx.lineCap="round";
  ctx.lineJoin="round";
  ctx.strokeStyle=st.color||"#ef4444";
  ctx.lineWidth=(st.width||3)*(window.devicePixelRatio||1);
  const pts=denormalizeStrokePts(st.pts||[],canvas);
  for(let i=2;i<pts.length;i++){
    const p0=pts[i-2],p1=pts[i-1],p2=pts[i],m1=mid(p0,p1),m2=mid(p1,p2);
    ctx.beginPath();
    ctx.moveTo(m1.x,m1.y);
    ctx.quadraticCurveTo(p1.x,p1.y,m2.x,m2.y);
    ctx.stroke();
  }
});
}
function clearInk(){
if(!confirm("현재 페이지 필기 삭제?"))return;
const s=currentSong();
if(s){
  s.ink=s.ink||{};
  s.ink[pageKey()]=[];
  persistSongInk(s);
}
save();
loadInk();
if(state.dual&&state.dualSong&&state.dualSong.id===state.viewer.id){drawDualInk(state.page)}
}
function toggleMode(){
  state.draw=false;
  state.pts=[];
  state.mode = state.mode==="write" ? "read" : "write";
  renderViewer();
}
function prev(){if(state.mode==="write")return toast("Write Mode에서는 이동 잠김");if(state.page>1){state.page--;renderViewer();return}const arr=currentSvc().songs.map(x=>{const s=findSongByRef(x);return s?s.id:x}),i=arr.indexOf(state.viewer.id);if(i>0)openViewer(arr[i-1]);else toast("첫 곡입니다")}
function next(){if(state.mode==="write")return toast("Write Mode에서는 이동 잠김");if(state.page<state.total){state.page++;renderViewer();return}const arr=currentSvc().songs.map(x=>{const s=findSongByRef(x);return s?s.id:x}),i=arr.indexOf(state.viewer.id);if(i>=0&&i<arr.length-1)openViewer(arr[i+1]);else toast("마지막입니다")}
function swipeStart(e){if(state.mode==="write"){try{e.preventDefault()}catch{};return}state.startX=e.changedTouches[0].clientX;state.startY=e.changedTouches[0].clientY}
function swipeEnd(e){if(state.mode==="write"){try{e.preventDefault()}catch{};return}const dx=e.changedTouches[0].clientX-state.startX,dy=e.changedTouches[0].clientY-state.startY;if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.3){dx<0?next():prev()}}
function zoomToggle(){const s=currentSong();s.zoom=s.zoom===1?1.25:1;save();renderViewer()}
function share(){const svc=currentSvc();const payload={v:1,name:svc.name,date:svc.date,songs:svc.songs.map(id=>{const s=state.songs.find(x=>x.id===id);return s?{id:s.id,title:s.title,key:s.key}:null}).filter(Boolean)};const url="https://terrysf-web.github.io/tvpcainos/index.html#share="+btoa(unescape(encodeURIComponent(JSON.stringify(payload))));navigator.clipboard?.writeText(url);toast("Share copied")}
["contextmenu","dragstart","gesturestart","gesturechange","gestureend"].forEach(type=>document.addEventListener(type,e=>{if(state.mode==="write"){try{e.preventDefault()}catch{};try{e.stopPropagation()}catch{}}},{passive:false,capture:true}));
let resizeTimer=null;
window.addEventListener("resize",()=>{
  if(!state.viewer)return;
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>renderViewer(),180);
});
window.addEventListener("orientationchange",()=>{
  if(!state.viewer)return;
  setTimeout(()=>renderViewer(),350);
});
async function waitForFirebaseApi(){
  for(let i=0;i<30;i++){
    if(window.TVPC_FB_READY) return await window.TVPC_FB_READY;
    await new Promise(r=>setTimeout(r,100));
  }
  return null;
}
async function loadSharedSongs(){
  try{
    const api = await waitForFirebaseApi();
    if(api){
      state.songs = await api.getSongs();
      attachSavedInkToSongs();
      render();
      api.watchSongs((songs)=>{ state.songs=songs; attachSavedInkToSongs(); render(); });
      return;
    }

    const res = await fetch(SHARED_SONGS_URL,{cache:"no-store"});
    if(!res.ok) throw new Error("songs.json load failed " + res.status);
    const data = await res.json();
    state.songs = Array.isArray(data) ? data.map((s,i)=>({
      id: s.id || ("song_"+i),
      title: s.title || s.name || "Untitled",
      key: s.key || "",
      pdf: s.pdf || s.file || s.filename || ""
    })) : [];
    attachSavedInkToSongs();
    render();
  }catch(e){
    console.error(e);
    toast("Song library 로드 실패");
    render();
  }
}

initAuthUI();
