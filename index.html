<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e8a93e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TVPC Worship" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>TVPC Worship</title>
    <style>
      html { height: 100%; overflow: hidden; margin:0; padding:0; background:#e8e6e0; }
      body, #root { height: 100%; margin:0; padding:0; background:#e8e6e0; }
      * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
      input, textarea { -webkit-user-select: text; user-select: text; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        // 1) Reload when a new SW takes control — hadController check prevents
        //    firing on first install (which also triggers controllerchange)
        if ('serviceWorker' in navigator) {
          var hadController = !!navigator.serviceWorker.controller;
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (hadController) window.location.reload();
          });
        }
        // 2) Poll /version.json every 5 minutes; reload if version changed.
        //    Update sessionStorage BEFORE reload to prevent infinite reload loop.
        function checkVersion() {
          fetch('/version.json?_=' + Date.now(), { cache: 'no-store' })
            .then(function(r) { return r.json(); })
            .then(function(d) {
              if (!d.version) return;
              var stored = sessionStorage.getItem('tvpc_ver');
              if (stored && stored !== d.version) {
                sessionStorage.setItem('tvpc_ver', d.version);
                window.location.reload();
              } else {
                sessionStorage.setItem('tvpc_ver', d.version);
              }
            }).catch(function() {});
        }
        setTimeout(checkVersion, 5000);
        setInterval(checkVersion, 5 * 60 * 1000);
      })();
    </script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous" async></script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
