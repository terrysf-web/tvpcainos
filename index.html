.back-btn{display:flex;align-items:center;gap:2px;background:none;color:#2563eb;font-size:15px;font-weight:600;padding:6px 2px}

/* CONTENT */

/* ── SONGS DATA ── */
const BUILTIN=[{id:1,title:"Amazing Grace",artist:"John Newton",key:"G",ki:7,bpm:72,ts:"3/4",sections:[{name:"Verse 1",lines:["[G]Amazing [G7]grace, how [C]sweet the [G]sound","That [G]saved a wretch like [D]me","I [G]once was [G7]lost, but [C]now am [G]found","Was [Em]blind, but [D]now I [G]see"]},{name:"Verse 2",lines:["'Twas [G]grace that [G7]taught my [C]heart to [G]fear","And [G]grace my fears re[D]lieved","How [G]precious [G7]did that [C]grace ap[G]pear","The [Em]hour I first be[D]lieved [G]"]}]},{id:2,title:"10,000 Reasons",artist:"Matt Redman",key:"G",ki:7,bpm:73,ts:"4/4",sections:[{name:"Chorus",lines:["[G]Bless the [D]Lord, O my [Em]soul, O my [C]soul","[G]Worship His [D]holy [C]name [G]","[G]Sing like never [D]before, O my [Em]soul","I'll [C]worship Your [G/B]holy [D]name"]},{name:"Verse 1",lines:["The [Em]sun comes [Bm]up, it's a new [C]day [G]dawning","It's [Em]time to [Bm]sing Your [C]song a[D]gain","What[Em]ever may [Bm]pass and what[C]ever lies be[G]fore me","Let [C]me be [G/B]singing when the [D]evening [G]comes"]}]},{id:3,title:"How Great Is Our God",artist:"Chris Tomlin",key:"G",ki:7,bpm:76,ts:"4/4",sections:[{name:"Verse 1",lines:["[G]The splendor of the [Em]King, clothed in ma[C]jesty","Let all the [D]earth rejoice, all the [G]earth rejoice","[G]He wraps Himself in [Em]light, and darkness [C]tries to hide"]},{name:"Chorus",lines:["How [G]great is our [D]God, sing with me","How [Em]great is our [C]God, and all will see","How [G]great, how [D]great [C]is our [G]God"]},{name:"Bridge",lines:["[G]Name above all names, [Em]worthy of all praise","[C]My heart will sing how [D]great is our [G]God"]}]},{id:4,title:"Blessed Be Your Name",artist:"Matt Redman",key:"A",ki:9,bpm:138,ts:"4/4",sections:[{name:"Verse 1",lines:["[A]Blessed be Your [E]name","In the [F#m]land that is [D]plentiful","Where Your [A]streams of abun[E]dance flow","[D]Blessed be Your [A]name"]},{name:"Chorus",lines:["[A]Blessed be the [E]name of the [F#m]Lord [D]","[A]Blessed be Your [E]glorious [D]name [A]","[A]Blessed be the [E]name of the [F#m]Lord [D]","[A]Blessed be Your [E]glorious [D]name"]}]},{id:5,title:"위대하신 주",artist:"워십팀",key:"G",ki:7,bpm:76,ts:"4/4",sections:[{name:"Verse 1",lines:["[G]주의 위대하심을 [Em]찬양해","[C]온 세상 그의 [D]것이요","[G]영원히 다스리시는 [Em]왕이시라","[C]주님만 [D]높이리"]},{name:"Chorus",lines:["[G]위대하신 주 [C]위대하신 주","[Em]노래해 [D]위대하신 주","[G]위대하신 주 [C]위대하신 주","[Em]영원히 [D]찬양받으실 [G]주"]}]},{id:6,title:"주를 찬양해",artist:"교회 워십",key:"D",ki:2,bpm:80,ts:"4/4",sections:[{name:"Verse 1",lines:["[D]거룩하신 주 [A]앞에 나아와","[Bm]두 손을 높이 [G]들어","[D]주의 이름을 [A]높여 드리며","[G]경배하리라 [A]"]},{name:"Chorus",lines:["[G]주를 [D/F#]찬양해 [Em]주를 [A]찬양해","[G]온 맘 다해 [D/F#]찬양해 [A]","[G]주를 [D/F#]찬양해 [Em]주를 [A]찬양해","[G]영원히 [A]찬양하리 [D]"]}]},{id:7,title:"주님 한 분만으로",artist:"예수전도단",key:"Bb",ki:10,bpm:68,ts:"4/4",sections:[{name:"Verse 1",lines:["[Bb]주님 한 분만으로 [F]난 만족해","[Gm]주님 한 분만으로 [Eb]족하네","[Bb]이 세상 그 무엇과도 [F]비교 못해"]},{name:"Chorus",lines:["[Eb]주님 [Bb/D]이름 [Cm]높이며 [F]찬양해","[Eb]주님 [Bb/D]앞에 [Cm]나아가 [F]경배해","[Bb]주님 [F]한 분만 [Eb]경배하리 [Bb]"]}]},{id:8,title:"Good Good Father",artist:"Chris Tomlin",key:"C",ki:0,bpm:68,ts:"4/4",sections:[{name:"Verse 1",lines:["[C]I've heard a thousand stories of what they [Am]think You're like","You're a [F]good good Father, it's [G]who You [C]are"]},{name:"Chorus",lines:["You're a [C]good good Father","It's [Am]who You are, it's [F]who You [C]are, it's [G]who You are","And I'm [C]loved by You","It's [Am]who I am, it's [F]who I [C]am, it's [G]who I am"]}]}];

const KEYS=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const SHARP=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FMAP={'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb'};
const FPREF=new Set(['F','Bb','Eb','Ab','Db','Gb']);

/* ── STATE ── */
const S={
  user:null, view:'login',
  services:[], custom:[], pdfMeta:{}, pdfData:{}, annots:{},
  svcId:null, songId:null,
  pdfPage:1, pdfTotal:1, pdfDoc:null,
  vmode:'chord',  // chord | pdf
  dual:false, wm:false, transpose:0, zoom:1,
  draw:false, pts:[], inkC:'#ef4444', inkW:3, activeC:null,
  inkTool:'pen', showThumbs:false, thumbs:{}, thumbsReady:false,
  undoData:null, undoPage:null, undoCanvas:null, pageAnim:'',
  showJump:false, pinchDist:null,
  unsubs:[], modal:null
};

/* ── UTILS ── */
const app=document.getElementById('app');
function esc(s){return(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function toast(m){const o=document.querySelector('.toast');if(o)o.remove();const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
function allSongs(){return[...BUILTIN,...S.custom]}
function songBy(id){return allSongs().find(s=>String(s.id)===String(id))}
function curSvc(){return S.services.find(s=>s.id===S.svcId)}
function svcTranspose(svcId,songId){const v=S.services.find(s=>s.id===svcId);return v?.songSettings?.[String(songId)]?.transpose||0}
function fdate(d){if(!d)return'';try{return new Date(d).toLocaleDateString('ko-KR',{month:'long',day:'numeric'})}catch{return d}}
function today(){return new Date().toISOString().slice(0,10)}

/* ── TRANSPOSE ── */
function nidx(n){let i=SHARP.indexOf(n);if(i>=0)return i;i=KEYS.indexOf(n);if(i>=0)return i;for(const[s,f]of Object.entries(FMAP))if(f===n)return SHARP.indexOf(s);return-1}
function i2n(i,flat){const n=SHARP[(i+1200)%12];return flat&&FMAP[n]?FMAP[n]:n}
function tNote(n,st){const i=nidx(n);if(i<0)return n;return i2n(i+st,FPREF.has(n)||n.includes('b'))}
function tChord(c,st){if(!st)return c;return c.split('/').map(p=>{const m=p.match(/^([A-G][#b]?)(.*)$/);return m?tNote(m[1],st)+m[2]:p}).join('/')}
function tKey(song,st){return KEYS[((song.ki+st)%12+12)%12]}
function parseLine(line,st){
  const tok=[];const re=/\[([^\]]+)\]([^\[]*)/g;let m;
  const fi=line.indexOf('[');if(fi>0)tok.push({c:'',l:line.slice(0,fi)});
  while((m=re.exec(line))!==null)tok.push({c:tChord(m[1],st),l:m[2]});
  if(!tok.length)tok.push({c:'',l:line});
  return tok;
}

/* ── FIREBASE ── */
function unsubAll(){S.unsubs.forEach(u=>u());S.unsubs=[];}
function subscribe(){
  if(!S.user)return;
  unsubAll();
  S.unsubs.push(db.collection('services').orderBy('date','desc').onSnapshot(snap=>{
    S.services=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(S.view==='home'||S.view==='service')render();
  }));
  S.unsubs.push(db.collection('customSongs').onSnapshot(snap=>{
    S.custom=snap.docs.map(d=>({...d.data(),id:d.id,custom:true}));
    if(S.view!=='viewer')render();
  }));
  S.unsubs.push(db.collection('pdfFiles').onSnapshot(snap=>{
    snap.docs.forEach(d=>{S.pdfMeta[d.id]={...d.data()}});
  }));
  db.collection(`userAnnotations/${S.user.uid}/pages`).get().then(snap=>{
    snap.docs.forEach(d=>{S.annots[d.id]=d.data().dataUrl});
  }).catch(()=>{});
}

async function createService(name,date){
  await db.collection('services').add({name,date,songIds:[],createdBy:S.user.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  toast('서비스 생성됨');
}
async function deleteSvc(id){
  if(!confirm('서비스를 삭제할까요?'))return;
  await db.collection('services').doc(id).delete();
  if(S.svcId===id){S.svcId=null;goTo('home');}else toast('삭제됨');
}
async function addSongToSvc(svcId,songId){
  const svc=S.services.find(s=>s.id===svcId);
  const ids=[...(svc?.songIds||[])];
  if(!ids.includes(String(songId)))ids.push(String(songId));
  await db.collection('services').doc(svcId).update({songIds:ids});
}
async function removeSong(svcId,songId){
  if(!confirm('셋리스트에서 제거할까요?'))return;
  const svc=S.services.find(s=>s.id===svcId);
  await db.collection('services').doc(svcId).update({songIds:(svc?.songIds||[]).filter(id=>String(id)!==String(songId))});
  toast('제거됨');
}
async function moveSong(svcId,idx,dir){
  const svc=S.services.find(s=>s.id===svcId);
  const ids=[...(svc?.songIds||[])];
  const j=idx+dir;if(j<0||j>=ids.length)return;
  [ids[idx],ids[j]]=[ids[j],ids[idx]];
  await db.collection('services').doc(svcId).update({songIds:ids});
}
async function saveSongTranspose(svcId,songId,st){
  const svc=S.services.find(s=>s.id===svcId)||{};
  const settings={...(svc.songSettings||{}),[String(songId)]:{...(svc.songSettings?.[String(songId)]||{}),transpose:st}};
  await db.collection('services').doc(svcId).update({songSettings:settings});
}

async function delCustomSong(id){if(!confirm('곡을 삭제할까요?'))return;await db.collection('customSongs').doc(id).delete();toast('삭제됨');}
async function loadPdf(songId){
  const sid=String(songId);
  if(S.pdfData[sid])return S.pdfData[sid];
  const meta=S.pdfMeta[sid];
  if(!meta?.chunkCount)return null;
  const chunks=[];
  for(let i=0;i<meta.chunkCount;i++){
    const d=await db.doc(`pdfFiles/${sid}/chunks/${i}`).get();
    if(d.exists)chunks.push(d.data().data);
  }
  S.pdfData[sid]=chunks.join('');
  return S.pdfData[sid];
}
async function saveAnnot(songId,page,dataUrl){
  if(!S.user)return;
  const key=`${songId}_${page}`;
  S.annots[key]=dataUrl;
  try{await db.doc(`userAnnotations/${S.user.uid}/pages/${key}`).set({dataUrl});}catch(e){console.warn(e);}
}

async function initPdf(songId){
  if(S.pdfDoc&&String(S.songId)===String(songId))return;

    const bin=atob(data),bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    S.pdfDoc=await pdfjsLib.getDocument({data:bytes}).promise;

    render();
  }catch(e){console.error(e);toast('PDF 로드 실패');S.vmode='chord';render();}
}

async function drawAll(){
  if(!S.pdfDoc)return;
  await drawPg('L',S.pdfPage);
  setupInk('inkL',S.pdfPage);

    await drawPg('R',S.pdfPage+1);
    setupInk('inkR',S.pdfPage+1);
  }

async function drawPg(side,pn){
  const stage=document.getElementById('pstage');
  const pdf=document.getElementById('pdf'+side);
  const ink=document.getElementById('ink'+side);
  const sheet=document.getElementById('sh'+side);
  if(!stage||!pdf||!ink||!sheet||!S.pdfDoc)return;
  const page=await S.pdfDoc.getPage(pn);
  const base=page.getViewport({scale:1});
  const gap=S.dual?16:0;
  const aw=Math.max(1,(stage.clientWidth-gap)/(S.dual?2:1)-4);
  const ah=Math.max(1,stage.clientHeight-8);
  const fit=Math.min(aw/base.width,ah/base.height)*(S.zoom||1);
  const vp=page.getViewport({scale:fit});
  const dpr=window.devicePixelRatio||1;
  const w=Math.round(vp.width),h=Math.round(vp.height);
  sheet.style.width=w+'px';sheet.style.height=h+'px';
  [pdf,ink].forEach(c=>{c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';});
  const ctx=pdf.getContext('2d',{alpha:false});
  ctx.setTransform(dpr,0,0,dpr,0,0);
  await page.render({canvasContext:ctx,viewport:vp}).promise;
  loadAnnot('ink'+side,String(S.songId),pn);
}

/* ── INK (완전히 수정된 버전) ── */
function setupInk(cid,pageNum){
  // 새 canvas 로 교체해서 이전 이벤트 완전 제거
  const old=document.getElementById(cid);if(!old)return;
  const nc=old.cloneNode(true);
  nc.width=old.width;nc.height=old.height;
  nc.style.width=old.style.width;nc.style.height=old.style.height;
  old.parentNode.replaceChild(nc,old);
  nc.id=cid;nc.dataset.page=pageNum;
  // Pointer events (애플 펜슬 포함 모든 포인터 지원)
  nc.addEventListener('pointerdown',onPD,{passive:false});
  nc.addEventListener('pointermove',onPM,{passive:false});
  nc.addEventListener('pointerup',onPU,{passive:false});
  nc.addEventListener('pointercancel',onPU,{passive:false});
  // 쓰기 모드에서 스크롤 방지
  nc.addEventListener('touchstart',e=>{if(S.wm)e.preventDefault();},{passive:false});
  nc.addEventListener('touchmove', e=>{if(S.wm)e.preventDefault();},{passive:false});
  // 기존 annotation 로드
  loadAnnot(cid,String(S.songId),pageNum);
}
function cpos(e,c){
  const r=c.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  return{x:(e.clientX-r.left)*dpr,y:(e.clientY-r.top)*dpr,p:e.pressure||0.5};
}
function cmid(a,b){return{x:(a.x+b.x)/2,y:(a.y+b.y)/2}}
function onPD(e){
  if(!S.wm)return;
  e.preventDefault();e.stopPropagation();
  try{e.currentTarget.setPointerCapture(e.pointerId)}catch{}
  // Save for undo before drawing
  S.undoCanvas=e.currentTarget;
  S.undoPage=parseInt(e.currentTarget.dataset.page)||S.pdfPage;
  S.undoData=e.currentTarget.toDataURL('image/png',0.85);
  S.draw=true;S.pts=[cpos(e,e.currentTarget)];S.activeC=e.currentTarget;
}
function onPM(e){
  if(!S.wm||!S.draw)return;
  e.preventDefault();e.stopPropagation();
  const c=S.activeC;if(!c)return;
  const p=cpos(e,c);S.pts.push(p);
  const ctx=c.getContext('2d',{desynchronized:true});
  const dpr=window.devicePixelRatio||1;
  if(S.inkTool==='eraser'){
    // Eraser: clear circular area
    ctx.save();
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();ctx.arc(p.x,p.y,(S.inkW*5+8)*dpr,0,Math.PI*2);ctx.fill();
    ctx.restore();
    return;
  }
  const n=S.pts.length;
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=S.inkC;
  ctx.lineWidth=(S.inkW+Math.max(0.2,p.p)*2)*dpr;
  if(n<3){
    if(n>=2){ctx.beginPath();ctx.moveTo(S.pts[0].x,S.pts[0].y);ctx.lineTo(p.x,p.y);ctx.stroke();}
  } else {
    const p0=S.pts[n-3],p1=S.pts[n-2],p2=p,m1=cmid(p0,p1),m2=cmid(p1,p2);
    ctx.beginPath();ctx.moveTo(m1.x,m1.y);ctx.quadraticCurveTo(p1.x,p1.y,m2.x,m2.y);ctx.stroke();
  }
}
function onPU(e){
  if(!S.draw)return;
  e.preventDefault();e.stopPropagation();
  try{e.currentTarget.releasePointerCapture(e.pointerId)}catch{}
  const c=S.activeC;
  if(c&&S.songId){
    const pg=parseInt(c.dataset.page)||S.pdfPage;
    saveAnnot(S.songId,pg,c.toDataURL('image/png',0.85));
  }
  S.draw=false;S.pts=[];S.activeC=null;
}
function loadAnnot(cid,songId,page){
  const c=document.getElementById(cid);if(!c)return;
  const key=`${songId}_${page}`;
  const du=S.annots[key];if(!du)return;
  const img=new Image();
  img.onload=()=>c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  img.src=du;
}
function clrInk(){
  if(!confirm('이 페이지 필기를 지울까요?'))return;
  ['inkL','inkR'].forEach(cid=>{
    const c=document.getElementById(cid);if(!c)return;
    c.getContext('2d').clearRect(0,0,c.width,c.height);
    const pg=parseInt(c.dataset.page)||S.pdfPage;
    const key=`${S.songId}_${pg}`;
    delete S.annots[key];
    if(S.user)db.doc(`userAnnotations/${S.user.uid}/pages/${key}`).delete().catch(()=>{});
  });
}

/* ── PDF NAVIGATION ── */
function pPrev(){
  if(S.wm){toast('쓰기 모드에서는 이동 불가');return;}
  const step=S.dual?2:1;
  if(S.pdfPage>1){S.pdfPage=Math.max(1,S.pdfPage-step);S.pageAnim='anim-l';render();return;}
  const svc=curSvc();if(!svc)return;
  const ids=svc.songIds||[];const i=ids.findIndex(id=>String(id)===String(S.songId));
  if(i>0)openViewer(ids[i-1],S.svcId);else toast('첫 번째 곡입니다');
}
function pNext(){
  if(S.wm){toast('쓰기 모드에서는 이동 불가');return;}
  const step=S.dual?2:1;
  const ok=S.dual?(S.pdfPage+2<=S.pdfTotal):(S.pdfPage<S.pdfTotal);
  if(ok){S.pdfPage+=step;S.pageAnim='anim-r';render();return;}
  const svc=curSvc();if(!svc)return;
  const ids=svc.songIds||[];const i=ids.findIndex(id=>String(id)===String(S.songId));
  if(i>=0&&i<ids.length-1)openViewer(ids[i+1],S.svcId);else toast('마지막 곡입니다');
}
let swx=0,swy=0;
function sws(e){if(S.wm)return;if(e.touches.length===1){swx=e.changedTouches[0].clientX;swy=e.changedTouches[0].clientY;}}
function swe(e){
  if(S.wm)return;if(S.pinchDist!=null){S.pinchDist=null;return;}
  const dx=e.changedTouches[0].clientX-swx,dy=e.changedTouches[0].clientY-swy;
  if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.3){dx<0?pNext():pPrev();}
}
window.addEventListener('resize',()=>{if(S.view==='viewer'&&S.vmode==='pdf')render();});

/* ── PIASCORE FUNCTIONS ── */

// Ink color / width / tool
function setInkColor(c){S.inkC=c;S.inkTool='pen';render();}
function setInkWidth(w){S.inkW=w;render();}
function toggleEraser(){S.inkTool=S.inkTool==='eraser'?'pen':'eraser';render();}

// Undo (single step)
function doUndo(){
  if(!S.undoData||!S.undoCanvas)return;
  const c=S.undoCanvas,ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  const img=new Image();
  img.onload=()=>ctx.drawImage(img,0,0);
  img.src=S.undoData;
  const key=`${S.songId}_${S.undoPage}`;
  S.annots[key]=S.undoData;
  saveAnnot(S.songId,S.undoPage,S.undoData);
  S.undoData=null;toast('↩ 실행취소');
}

// Page jump
function toggleJump(){S.showJump=!S.showJump;render();}
function doJump(){
  const v=parseInt(document.getElementById('jumpInput')?.value)||1;
  S.pdfPage=Math.max(1,Math.min(S.pdfTotal,v));
  S.showJump=false;render();
}

// Thumbnail strip
function toggleThumbs(){S.showThumbs=!S.showThumbs;render();}
async function renderThumbs(){
  const strip=document.getElementById('thumbStrip');if(!strip||!S.pdfDoc)return;
  strip.innerHTML='';
  for(let i=1;i<=S.pdfTotal;i++){
    const item=document.createElement('div');
    item.className='thumb-item'+(i===S.pdfPage?' active':'');
    const pg=i;
    item.onclick=()=>{S.pdfPage=pg;render();};
    // Use cached canvas or render new
    if(S.thumbs[i]){
      item.appendChild(S.thumbs[i].cloneNode());
    } else {
      const tc=document.createElement('canvas');
      tc.style.cssText='width:46px;height:60px;display:block';
      item.appendChild(tc);
      const num=document.createElement('div');num.className='thumb-num';num.textContent=i;
      item.appendChild(num);
      strip.appendChild(item);
      // Render async
      (async()=>{
        try{
          const page=await S.pdfDoc.getPage(i);
          const base=page.getViewport({scale:1});
          const scale=60/base.height;
          const vp=page.getViewport({scale});
          tc.width=Math.round(vp.width);tc.height=Math.round(vp.height);
          tc.style.width=Math.round(vp.width)+'px';tc.style.height='60px';
          await page.render({canvasContext:tc.getContext('2d'),viewport:vp}).promise;
          S.thumbs[i]=tc.cloneNode(true);
        }catch{}
      })();
      continue;
    }
    const num=document.createElement('div');num.className='thumb-num';num.textContent=i;
    item.appendChild(num);
    strip.appendChild(item);
  }
  // Scroll active into view
  const active=strip.querySelector('.thumb-item.active');
  if(active)active.scrollIntoView({inline:'center',behavior:'smooth'});
}

// Pinch zoom
function setupPinchZoom(){
  const stage=document.getElementById('pstage');if(!stage)return;
  stage.addEventListener('touchstart',e=>{
    if(e.touches.length===2){S.pinchDist=pinchD(e);e.preventDefault();}
  },{passive:false});
  stage.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&S.pinchDist!==null){
      const d=pinchD(e);
      if(d&&S.pinchDist){
        S.zoom=Math.max(0.5,Math.min(4,S.zoom*(d/S.pinchDist)));
        S.pinchDist=d;drawAll();}
      e.preventDefault();
    }
  },{passive:false});
  stage.addEventListener('touchend',e=>{if(e.touches.length<2)S.pinchDist=null;});
  // Swipe
  stage.addEventListener('touchstart',sws,{passive:false});
  stage.addEventListener('touchend',swe,{passive:false});
}
function pinchD(e){
  const t=e.touches;if(t.length<2)return null;
  return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
}

/* ── MODALS ── */
function showModal(type){
  S.modal=type;
  const old=document.querySelector('.mbg');if(old)old.remove();
  const bg=document.createElement('div');bg.className='mbg';
  bg.innerHTML=mHTML(type);
  bg.addEventListener('click',e=>{if(e.target===bg)closeModal();});
  document.body.appendChild(bg);
}
function closeModal(){S.modal=null;const o=document.querySelector('.mbg');if(o)o.remove();}
function mHTML(type){
  if(type==='new-svc')return`<div class="mod">
    <h3>새 예배 서비스</h3>
    <div class="fld"><label>이름</label><input id="mn" placeholder="주일예배, 금요예배 ..."></div>
    <div class="fld"><label>날짜</label><input id="md" type="date" value="${today()}"></div>
    <div class="mact"><button class="bg" onclick="closeModal()">취소</button><button class="bp" onclick="doNewSvc()">생성</button></div>
  </div>`;
  if(type==='add-song')return`<div class="mod">
    <h3>곡 추가</h3>
    <input id="ms" placeholder="검색..." oninput="filterSongs()" style="margin-bottom:4px">
    <div id="mslist" style="max-height:55vh;overflow-y:auto;display:grid;gap:1px;border-radius:10px;overflow:hidden">
      ${allSongs().map(s=>`<div class="crow" style="background:#fff" onclick="doAddSong('${s.id}')">
        <div class="cm"><div class="ct">${esc(s.title)}</div><div class="cx">${esc(s.artist)} · Key ${esc(s.key)}</div></div>
      </div>`).join('')}
    </div>
    <button class="bg" onclick="closeModal()">닫기</button>
  </div>`;
  if(type==='add-custom')return`<div class="mod">
    <h3>새 곡 추가</h3>
    <div class="fld"><label>제목</label><input id="mtt" placeholder="곡 제목"></div>
    <div class="fld"><label>아티스트</label><input id="mar" placeholder="아티스트 이름"></div>
    <div class="fld"><label>원키</label><select id="mky">${KEYS.map(k=>`<option>${k}</option>`).join('')}</select></div>
    <div class="fld"><label>BPM</label><input id="mbp" type="number" placeholder="120" value="120"></div>
    <div class="mact"><button class="bg" onclick="closeModal()">취소</button><button class="bp" onclick="doAddCustom()">추가</button></div>
  </div>`;
  return'';
}
function filterSongs(){
  const q=(document.getElementById('ms')?.value||'').toLowerCase();
  const list=document.getElementById('mslist');if(!list)return;
  list.innerHTML=allSongs().filter(s=>!q||s.title.toLowerCase().includes(q)||s.artist.toLowerCase().includes(q))
    .map(s=>`<div class="crow" style="background:#fff" onclick="doAddSong('${s.id}')">
      <div class="cm"><div class="ct">${esc(s.title)}</div><div class="cx">${esc(s.artist)} · Key ${esc(s.key)}</div></div>
    </div>`).join('');
}
async function doNewSvc(){
  const n=document.getElementById('mn')?.value?.trim();
  const d=document.getElementById('md')?.value;
  if(!n||!d){toast('이름과 날짜를 입력하세요');return;}
  closeModal();await createService(n,d);
}
async function doAddSong(id){
  if(!S.svcId){toast('서비스가 없습니다');return;}
  closeModal();await addSongToSvc(S.svcId,id);toast('추가됨');
}
async function doAddCustom(){
  const t=document.getElementById('mtt')?.value?.trim();
  if(!t){toast('제목을 입력하세요');return;}
  const ar=document.getElementById('mar')?.value?.trim()||'';
  const ky=document.getElementById('mky')?.value||'C';
  const bp=parseInt(document.getElementById('mbp')?.value)||120;
  closeModal();
  await addCustomSong({title:t,artist:ar,key:ky,ki:KEYS.indexOf(ky),bpm:bp,ts:'4/4',sections:[]});
}

/* ── AUTH ── */
auth.onAuthStateChanged(user=>{
  if(user){S.user=user;subscribe();goTo('home');}
  else{S.user=null;unsubAll();goTo('login');}
});
