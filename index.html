<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TVPC Worship Charts</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="WorshipCharts" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *{box-sizing:border-box} html,body,#app{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a} button,input,select{font:inherit} button{border:0;border-radius:12px;padding:10px 14px;background:#2563eb;color:white;font-weight:700} button.secondary{background:#e2e8f0;color:#0f172a} button.danger{background:#ef4444}.app-shell{height:100%;display:grid;grid-template-rows:auto 1fr}.topbar{display:flex;gap:10px;align-items:center;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;background:#0f2f57;color:white;box-shadow:0 2px 10px rgba(15,23,42,.16)}.topbar h1{font-size:18px;margin:0;white-space:nowrap}.topbar .spacer{flex:1}.tabs{display:flex;gap:8px}.tabs button{background:rgba(255,255,255,.15);padding:8px 12px}.tabs button.active{background:white;color:#0f2f57}.page{overflow:auto;padding:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:white;border-radius:18px;box-shadow:0 8px 24px rgba(15,23,42,.08);padding:16px}.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.field{display:grid;gap:6px;margin:8px 0}.field label{font-size:13px;color:#475569;font-weight:700}.field input,.field select{border:1px solid #cbd5e1;border-radius:12px;padding:10px 12px;background:white;min-width:160px}.song-list{display:grid;gap:10px}.song-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px;border:1px solid #e2e8f0;border-radius:14px;background:#fff}.muted{color:#64748b;font-size:13px}.service-actions{position:sticky;bottom:0;background:linear-gradient(transparent,#f8fafc 18%);padding-top:30px;display:flex;gap:10px;justify-content:flex-end}.viewer{position:fixed;inset:0;z-index:20;background:#111827;display:grid;grid-template-rows:auto 1fr;overscroll-behavior-x:none;touch-action:pan-y pinch-zoom}.viewer.library .viewerbar{display:flex}.viewer.service .viewerbar{display:none}.viewerbar{gap:8px;align-items:center;padding:calc(8px + env(safe-area-inset-top)) 10px 8px;background:rgba(15,23,42,.96);color:white}.viewerbar .title{font-weight:800;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.pdf-stage{position:relative;overflow:hidden;display:grid;place-items:center;min-height:0;touch-action:pan-y pinch-zoom}.pdf-wrap{position:relative;background:white;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.1),0 15px 50px rgba(0,0,0,.4);max-width:100%;max-height:100%}canvas{display:block;background:white}.crop-panel{position:fixed;right:14px;top:calc(62px + env(safe-area-inset-top));width:260px;max-width:calc(100vw - 28px);background:white;color:#0f172a;border-radius:16px;padding:14px;box-shadow:0 18px 50px rgba(0,0,0,.28);z-index:30;display:grid;gap:10px}.crop-panel input[type=range]{width:100%}.crop-box{position:absolute;border:3px solid #2563eb;pointer-events:none;box-shadow:0 0 0 9999px rgba(37,99,235,.12)}.hint{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(15,23,42,.85);color:white;padding:8px 12px;border-radius:999px;font-size:13px;opacity:.9}@media(max-width:900px){.grid{grid-template-columns:1fr}.topbar h1{font-size:16px}}
  </style>
</head>
<body><div id="app"></div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
const BASE_SHARE_URL="https://terrysf-web.github.io/tvpc-worship/index.html";const DB_NAME="tvpc-worship-db";const STORE="files";let dbPromise=null;function openDB(){if(dbPromise)return dbPromise;dbPromise=new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=()=>req.result.createObjectStore(STORE);req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)});return dbPromise}async function putFile(id,data){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).put(data,id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})}async function getFile(id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,"readonly");const r=tx.objectStore(STORE).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}const $=(s,p=document)=>p.querySelector(s);const app=$("#app");const state={tab:"library",songs:JSON.parse(localStorage.getItem("songs")||"[]"),setlist:JSON.parse(localStorage.getItem("setlist")||"[]"),viewer:null,cropOpen:false,currentPdf:null,currentPage:1,renderTask:null,touchStartX:0,touchStartY:0};function save(){localStorage.setItem("songs",JSON.stringify(state.songs));localStorage.setItem("setlist",JSON.stringify(state.setlist))}function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}function esc(s){return(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}function fileToDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}function render(){if(state.viewer)return renderViewer();app.innerHTML=`<div class="app-shell"><div class="topbar"><h1>TVPC Worship Charts</h1><div class="tabs"><button class="${state.tab==='library'?'active':''}" onclick="setTab('library')">Song Library</button><button class="${state.tab==='service'?'active':''}" onclick="setTab('service')">Service</button></div><div class="spacer"></div><button class="secondary" onclick="shareService()">Share</button></div><div class="page">${state.tab==='library'?libraryHTML():serviceHTML()}</div></div>`}function setTab(t){state.tab=t;render()}function libraryHTML(){return `<div class="grid"><div class="card"><h2>곡 추가</h2><div class="field"><label>Title</label><input id="title" placeholder="곡 제목"></div><div class="field"><label>Key</label><select id="key">${["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"].map(k=>`<option>${k}</option>`).join("")}</select></div><div class="field"><label>PDF</label><input id="pdf" type="file" accept="application/pdf"></div><button onclick="addSong()">Add Song</button><p class="muted">PDF는 iPad 내부 IndexedDB에 저장됩니다.</p></div><div class="card"><h2>Song Library</h2><div class="song-list">${state.songs.map(songItemHTML).join("")||`<p class="muted">아직 곡이 없습니다.</p>`}</div></div></div>`}function songItemHTML(s){return `<div class="song-item"><div><b>${esc(s.title)}</b><div class="muted">Key ${esc(s.key||"")}</div></div><div class="row"><button class="secondary" onclick="openViewer('${s.id}','library')">Crop/Edit</button><button onclick="addToSetlist('${s.id}')">Service에 추가</button><button class="danger" onclick="deleteSong('${s.id}')">삭제</button></div></div>`}async function addSong(){const title=$("#title").value.trim();const key=$("#key").value;const file=$("#pdf").files[0];if(!title||!file)return alert("Title과 PDF를 넣어주세요.");const id=uid();await putFile(id,await fileToDataURL(file));state.songs.push({id,title,key,crop:{l:0,t:0,r:0,b:0},zoom:1});save();render()}function deleteSong(id){if(!confirm("삭제할까요?"))return;state.songs=state.songs.filter(s=>s.id!==id);state.setlist=state.setlist.filter(x=>x!==id);save();render()}function addToSetlist(id){if(!state.setlist.includes(id))state.setlist.push(id);save();render()}function serviceHTML(){const rows=state.setlist.map((id,idx)=>{const s=state.songs.find(x=>x.id===id);if(!s)return"";return `<div class="song-item"><div><b>${idx+1}. ${esc(s.title)}</b><div class="muted">Key ${esc(s.key||"")}</div></div><div class="row"><button onclick="openViewer('${s.id}','service')">열기</button><button class="secondary" onclick="moveSet(${idx},-1)">↑</button><button class="secondary" onclick="moveSet(${idx},1)">↓</button><button class="danger" onclick="removeSet(${idx})">제거</button></div></div>`}).join("");return `<div class="grid"><div class="card"><h2>Service Setlist</h2><div class="song-list">${rows||`<p class="muted">Song Library에서 곡을 추가하세요.</p>`}</div><div class="service-actions"><button class="secondary" onclick="clearSetlist()">Clear</button><button onclick="openFirstService()">Start Service</button></div></div><div class="card"><h2>예배 화면 원칙</h2><p>Service 악보 화면에는 Crop/Zoom/Save/Reset 버튼이 나오지 않습니다.</p><p>악보만 fullscreen으로 보이고, 좌우 swipe로 곡 이동합니다.</p></div></div>`}function moveSet(i,d){const j=i+d;if(j<0||j>=state.setlist.length)return;[state.setlist[i],state.setlist[j]]=[state.setlist[j],state.setlist[i]];save();render()}function removeSet(i){state.setlist.splice(i,1);save();render()}function clearSetlist(){if(confirm("Setlist를 비울까요?")){state.setlist=[];save();render()}}function openFirstService(){if(!state.setlist.length)return alert("Setlist가 비어 있습니다.");openViewer(state.setlist[0],"service")}async function openViewer(id,mode){const song=state.songs.find(s=>s.id===id);if(!song)return;state.viewer={id,mode};state.cropOpen=false;state.currentPdf=null;state.currentPage=1;render();const data=await getFile(id);if(!data){alert("PDF 파일을 찾을 수 없습니다. 다시 추가해야 합니다.");closeViewer();return}state.currentPdf=await pdfjsLib.getDocument(data).promise;await drawPdf();if(mode==="service")lockServiceMode()}function closeViewer(){state.viewer=null;state.currentPdf=null;render()}async function drawPdf(){if(!state.currentPdf||!state.viewer)return;const song=state.songs.find(s=>s.id===state.viewer.id);const page=await state.currentPdf.getPage(state.currentPage);const stage=$("#pdfStage");const canvas=$("#pdfCanvas");const ctx=canvas.getContext("2d");const base=page.getViewport({scale:1});const crop=song.crop||{l:0,t:0,r:0,b:0};const zoom=song.zoom||1;const availableW=Math.max(320,stage.clientWidth);const availableH=Math.max(320,stage.clientHeight);const cropW=base.width*(1-(crop.l+crop.r)/100);const cropH=base.height*(1-(crop.t+crop.b)/100);const fit=Math.min(availableW/cropW,availableH/cropH)*zoom;const viewport=page.getViewport({scale:fit});canvas.width=Math.round(viewport.width);canvas.height=Math.round(viewport.height);canvas.style.width=canvas.width+"px";canvas.style.height=canvas.height+"px";if(state.renderTask)try{state.renderTask.cancel()}catch(e){}state.renderTask=page.render({canvasContext:ctx,viewport});try{await state.renderTask.promise}catch(e){}const wrap=$("#pdfWrap");const left=viewport.width*crop.l/100;const top=viewport.height*crop.t/100;const right=viewport.width*crop.r/100;const bottom=viewport.height*crop.b/100;wrap.style.width=Math.max(10,viewport.width-left-right)+"px";wrap.style.height=Math.max(10,viewport.height-top-bottom)+"px";canvas.style.transform=`translate(${-left}px, ${-top}px)`;updateCropBox()}function renderViewer(){const song=state.songs.find(s=>s.id===state.viewer.id);const mode=state.viewer.mode;app.innerHTML=`<div class="viewer ${mode}" id="viewer"><div class="viewerbar"><button class="secondary" onclick="closeViewer()">Back</button><div class="title">${esc(song.title)}</div><button class="secondary" onclick="zoom(-.05)">-</button><span>${Math.round((song.zoom||1)*100)}%</span><button class="secondary" onclick="zoom(.05)">+</button><button class="secondary" onclick="toggleCrop()">Crop</button><button onclick="saveCrop()">저장</button><button class="secondary" onclick="resetCrop()">Reset</button></div><div id="pdfStage" class="pdf-stage" ontouchstart="viewerTouchStart(event)" ontouchend="viewerTouchEnd(event)"><div id="pdfWrap" class="pdf-wrap"><canvas id="pdfCanvas"></canvas><div id="cropBox" class="crop-box" style="display:none"></div></div></div>${mode==="library"&&state.cropOpen?cropPanelHTML(song):""}${mode==="service"?`<div class="hint">${servicePositionText()}</div>`:""}</div>`}function servicePositionText(){const i=state.setlist.indexOf(state.viewer.id);return i>=0?`${i+1} / ${state.setlist.length}`:""}function toggleCrop(){state.cropOpen=!state.cropOpen;renderViewer();drawPdf()}function cropPanelHTML(song){const c=song.crop||{l:0,t:0,r:0,b:0};return `<div class="crop-panel"><b>Crop / 공백 조절</b>${["l","r","t","b"].map(k=>`<label>${({l:"Left",r:"Right",t:"Top",b:"Bottom"}[k])}: <span id="${k}v">${c[k]}</span>%<input type="range" min="0" max="35" value="${c[k]}" oninput="setCrop('${k}',this.value)"></label>`).join("")}<button onclick="saveCrop()">저장</button><button class="secondary" onclick="resetCrop()">Reset</button></div>`}function setCrop(k,v){const song=state.songs.find(s=>s.id===state.viewer.id);song.crop=song.crop||{l:0,t:0,r:0,b:0};song.crop[k]=Number(v);const label=$("#"+k+"v");if(label)label.textContent=v;drawPdf()}function zoom(d){const song=state.songs.find(s=>s.id===state.viewer.id);song.zoom=Math.max(.5,Math.min(2.5,(song.zoom||1)+d));save();renderViewer();drawPdf()}function saveCrop(){save();alert("저장되었습니다.")}function resetCrop(){const song=state.songs.find(s=>s.id===state.viewer.id);song.crop={l:0,t:0,r:0,b:0};song.zoom=1;save();renderViewer();drawPdf()}function updateCropBox(){const box=$("#cropBox");if(!box||!state.cropOpen)return;box.style.display="block";box.style.left="0";box.style.top="0";box.style.right="0";box.style.bottom="0"}function viewerTouchStart(e){state.touchStartX=e.changedTouches[0].clientX;state.touchStartY=e.changedTouches[0].clientY;if(state.viewer&&state.viewer.mode==="service"&&state.touchStartX<42)e.preventDefault()}function viewerTouchEnd(e){if(!state.viewer||state.viewer.mode!=="service")return;const dx=e.changedTouches[0].clientX-state.touchStartX;const dy=e.changedTouches[0].clientY-state.touchStartY;if(Math.abs(dx)<70||Math.abs(dx)<Math.abs(dy)*1.4)return;const currentIndex=state.setlist.indexOf(state.viewer.id);if(dx<0){if(currentIndex<state.setlist.length-1)openViewer(state.setlist[currentIndex+1],"service")}else{if(currentIndex>0)openViewer(state.setlist[currentIndex-1],"service")}}function lockServiceMode(){try{history.pushState({serviceLock:true},"",location.href);window.onpopstate=function(){if(state.viewer&&state.viewer.mode==="service")history.pushState({serviceLock:true},"",location.href)}}catch(e){}}function shareService(){const payload={v:2,date:new Date().toISOString().slice(0,10),name:"Service",songs:state.setlist.map(id=>{const s=state.songs.find(x=>x.id===id);return s?{id:s.id,title:s.title,key:s.key}:null}).filter(Boolean)};const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));const url=`${BASE_SHARE_URL}#share=${encoded}`;if(navigator.share)navigator.share({title:"TVPC Worship Setlist",url}).catch(()=>copy(url));else copy(url)}function copy(text){navigator.clipboard?.writeText(text);alert("Share 링크가 복사되었습니다.\n"+text)}(function loadShare(){if(location.hash.startsWith("#share=")){try{const raw=decodeURIComponent(escape(atob(location.hash.slice(7))));const data=JSON.parse(raw);alert("공유 링크를 열었습니다. PDF 파일은 각 iPad Library에 있어야 합니다.\n곡 수: "+(data.songs?.length||0))}catch(e){}}})();render();
</script></body></html>
